<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Montagnette">
<meta name="theme-color" content="#0f0f17">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="icon" type="image/png" href="icons/favicon.png">
<title>Montagnette</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root{
  --bg:#0f0f17;--bg2:#181824;--bg3:#20202e;--bg4:#2c2c3e;
  --border:rgba(255,255,255,0.09);--border2:rgba(255,255,255,0.16);
  --t1:#f0eff8;--t2:#b8b8d0;--t3:#7878a0;
  --accent:#7c9eff;--green:#3dffa0;--amber:#ffc04d;--red:#ff7070;--purple:#d09aff;
  --fs-xs:11px;--fs-sm:13px;--fs-md:15px;--fs-lg:17px;--fs-xl:22px;--fs-xxl:30px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--t1);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:var(--fs-md);line-height:1.5;min-height:100vh;padding-bottom:84px;}

/* ── LOGIN ── */
#login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:2rem;text-align:center;}
.logo-title{font-size:34px;font-weight:700;letter-spacing:3px;color:var(--t1);margin-bottom:6px;}
.logo-sub{font-size:13px;color:var(--accent);letter-spacing:5px;margin-bottom:3rem;}
.connect-btn{display:flex;align-items:center;gap:12px;background:#fc4c02;color:#fff;border:none;border-radius:12px;padding:16px 32px;font-size:16px;font-weight:600;cursor:pointer;min-height:52px;}
.connect-btn svg{width:22px;height:22px;flex-shrink:0;}
.login-note{font-size:13px;color:var(--t3);margin-top:1.5rem;max-width:280px;line-height:1.6;}

/* ── APP SHELL ── */
#app{display:none;}
.topbar{background:var(--bg2);border-bottom:0.5px solid var(--border2);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.app-name{font-size:17px;font-weight:700;letter-spacing:2px;color:var(--t1);}
.app-name span{color:var(--accent);}
.athlete-info{display:flex;align-items:center;gap:10px;}
.athlete-avatar{width:32px;height:32px;border-radius:50%;border:1.5px solid var(--accent);object-fit:cover;}
.athlete-name{font-size:13px;color:var(--t2);}
.disconnect{font-size:12px;color:var(--t3);cursor:pointer;text-decoration:underline;}

/* ── NAV ── */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:0.5px solid var(--border2);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom);}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 4px 8px;cursor:pointer;border:none;background:none;min-height:52px;}
.nav-btn svg{width:20px;height:20px;stroke:var(--t3);}
.nav-btn span{font-size:11px;color:var(--t3);}
.nav-btn.on svg{stroke:var(--accent);}
.nav-btn.on span{color:var(--accent);font-weight:500;}

/* ── PAGES ── */
.page{display:none;padding:16px;}
.page.on{display:block;}

/* ── CARDS ── */
.card{background:var(--bg2);border:0.5px solid var(--border2);border-radius:14px;padding:14px 16px;margin-bottom:14px;}
.card-title{font-size:15px;font-weight:500;color:var(--t1);margin-bottom:12px;}
.slbl{font-size:11px;color:var(--t2);font-weight:600;text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:8px;}

/* ── METRIC CARDS ── */
.row3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;}
.row2{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:14px;}
.mc{border-radius:10px;padding:12px 10px;border:0.5px solid var(--border);background:var(--bg3);}
.mc-v{font-size:20px;font-weight:500;color:var(--t1);line-height:1.1;}
.mc-l{font-size:11px;color:var(--t2);margin-top:4px;text-transform:uppercase;letter-spacing:.03em;}
.mc.g{background:rgba(61,255,160,0.09);border-color:rgba(61,255,160,0.22);}.mc.g .mc-v{color:var(--green);}
.mc.a{background:rgba(255,192,77,0.09);border-color:rgba(255,192,77,0.22);}.mc.a .mc-v{color:var(--amber);}
.mc.b{background:rgba(124,158,255,0.09);border-color:rgba(124,158,255,0.22);}.mc.b .mc-v{color:var(--accent);}
.mc.r{background:rgba(255,112,112,0.09);border-color:rgba(255,112,112,0.22);}.mc.r .mc-v{color:var(--red);}
.mc.p{background:rgba(208,154,255,0.09);border-color:rgba(208,154,255,0.22);}.mc.p .mc-v{color:var(--purple);}

/* ── OBJECTIF CARD ── */
.obj-card{border-radius:12px;padding:14px;margin-bottom:10px;background:var(--bg3);border:0.5px solid var(--border2);}
.obj-card.pri{border-left:3px solid var(--accent);border-radius:0 12px 12px 0;background:rgba(124,158,255,0.06);}
.obj-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
.obj-name{font-size:15px;font-weight:500;color:var(--t1);}
.obj-date{font-size:12px;color:var(--t2);margin-top:3px;}
.bdg{font-size:11px;font-weight:500;padding:3px 10px;border-radius:5px;flex-shrink:0;}
.bt{background:rgba(61,255,160,0.1);color:var(--green);border:0.5px solid rgba(61,255,160,0.25);}
.br{background:rgba(124,158,255,0.1);color:var(--accent);border:0.5px solid rgba(124,158,255,0.25);}
.cdown{font-size:32px;font-weight:500;color:var(--accent);margin:8px 0 6px;letter-spacing:-.02em;}
.pb{height:5px;border-radius:3px;background:var(--bg4);overflow:hidden;margin-bottom:4px;}
.pf{height:100%;border-radius:3px;background:var(--accent);}
.plr{display:flex;justify-content:space-between;}
.pl{font-size:11px;color:var(--t2);}
.pl.hi{color:var(--accent);}

/* ── PLAN GRID ── */
.plan-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-top:10px;}
.plan-mc{border-radius:8px;padding:9px 8px;background:var(--bg4);border:0.5px solid var(--border);}
.plan-v{font-size:13px;font-weight:500;color:var(--t1);line-height:1.2;}
.plan-l{font-size:11px;color:var(--t2);margin-top:3px;}
.plan-ok .plan-v{color:var(--green);}
.plan-warn .plan-v{color:var(--amber);}

/* ── RÉSUMÉ 7J ── */
.resume-7j{font-size:14px;color:var(--t2);margin-bottom:12px;line-height:1.5;}
.resume-7j strong{color:var(--t1);font-weight:500;}

/* ── ACTIVITÉ MINI-CARTE (7 derniers jours) ── */
.act-mini{background:var(--bg3);border:0.5px solid var(--border);border-radius:10px;padding:11px 13px;margin-bottom:8px;display:flex;align-items:center;gap:12px;}
.act-mini-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.act-mini-body{flex:1;min-width:0;}
.act-mini-name{font-size:14px;font-weight:500;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.act-mini-type{font-size:12px;color:var(--t3);margin-top:2px;}
.act-mini-meta{font-size:12px;color:var(--t2);margin-top:2px;}
.act-mini-badge{font-size:11px;font-weight:500;padding:3px 8px;border-radius:5px;flex-shrink:0;}

/* ── BLOC STATS 7J ── */
.stats7{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;}
.s7{border-radius:10px;padding:12px 10px;background:var(--bg3);border:0.5px solid var(--border);text-align:center;}
.s7-v{font-size:18px;font-weight:500;color:var(--t1);line-height:1;}
.s7-l{font-size:11px;color:var(--t2);margin-top:4px;}

/* ── ZONES ── */
.zrow{display:flex;align-items:center;gap:8px;margin-bottom:7px;}
.zl{font-size:12px;color:var(--t2);width:20px;}
.zbg{flex:1;height:6px;border-radius:3px;background:var(--bg3);overflow:hidden;}
.zf{height:100%;border-radius:3px;}
.zp{font-size:12px;color:var(--t2);width:30px;text-align:right;}

/* ── ACTIVITÉS LIST ── */
.act-item{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:0.5px solid var(--border);}
.act-item:last-child{border-bottom:none;}
.act-dot{width:8px;height:8px;border-radius:50%;margin-right:12px;flex-shrink:0;}
.act-name{font-size:14px;font-weight:500;color:var(--t1);}
.act-meta{font-size:12px;color:var(--t2);margin-top:3px;line-height:1.4;}
.act-badge{font-size:11px;font-weight:500;padding:3px 8px;border-radius:5px;flex-shrink:0;}

/* ── COACH BOX ── */
.cbox{background:rgba(124,158,255,0.07);border:0.5px solid rgba(124,158,255,0.2);border-radius:10px;padding:12px 14px;margin-top:10px;}
.ct{font-size:13px;color:#aec4ff;line-height:1.6;}
.cbox.warn{background:rgba(255,192,77,0.07);border-color:rgba(255,192,77,0.2);}.cbox.warn .ct{color:#ffc04d;}
.cbox.ok{background:rgba(61,255,160,0.07);border-color:rgba(61,255,160,0.2);}.cbox.ok .ct{color:#3dffa0;}

/* ── FORMS ── */
.form-group{margin-bottom:12px;}
.form-label{font-size:12px;color:var(--t2);text-transform:uppercase;letter-spacing:.04em;display:block;margin-bottom:5px;}
.form-input{width:100%;background:var(--bg3);border:0.5px solid var(--border2);border-radius:10px;padding:12px 14px;font-size:15px;color:var(--t1);outline:none;min-height:48px;}
.form-input:focus{border-color:var(--accent);}
.form-row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.form-select{width:100%;background:var(--bg3);border:0.5px solid var(--border2);border-radius:10px;padding:12px 14px;font-size:15px;color:var(--t1);outline:none;min-height:48px;}
.add-btn{width:100%;height:48px;border-radius:12px;background:rgba(124,158,255,0.15);border:0.5px solid var(--accent);color:var(--accent);font-size:15px;font-weight:500;cursor:pointer;margin-top:6px;}

/* ── STAT LINES ── */
.sline{display:flex;justify-content:space-between;padding:12px 0;border-bottom:0.5px solid var(--border);align-items:center;}
.sline:last-child{border-bottom:none;}
.sk{font-size:14px;color:var(--t2);}
.sv{font-size:14px;font-weight:500;color:var(--t1);}
.su{font-size:12px;color:var(--green);margin-left:5px;}
.sa{font-size:14px;font-weight:500;color:var(--accent);cursor:pointer;}

/* ── CHARTS ── */
.chart-wrap{position:relative;width:100%;height:180px;margin-bottom:6px;}
.chart-wrap-sm{position:relative;width:100%;height:140px;margin-bottom:6px;}

/* ── MISC ── */
.loader{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:3rem;gap:14px;}
.spinner{width:34px;height:34px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loader-text{font-size:14px;color:var(--t2);}
.empty{text-align:center;padding:2rem;color:var(--t3);font-size:14px;line-height:1.7;}
.install-banner{background:rgba(124,158,255,0.08);border:0.5px solid rgba(124,158,255,0.2);border-radius:12px;padding:13px 15px;margin-bottom:14px;display:flex;align-items:center;gap:12px;}
.install-banner p{font-size:13px;color:#aec4ff;line-height:1.5;flex:1;}
.install-banner button{font-size:12px;color:var(--accent);background:none;border:0.5px solid var(--accent);border-radius:8px;padding:7px 12px;cursor:pointer;flex-shrink:0;min-height:36px;}
</style>
</head>
<body>

<div id="login-screen">
  <div style="margin-bottom:2rem;">
    <svg width="88" height="88" viewBox="0 0 512 512" style="border-radius:20px;">
      <rect width="512" height="512" fill="#0f0f17"/>
      <polygon points="100,350 200,145 300,350" fill="#141422" stroke="#4a6bff" stroke-width="2"/>
      <polygon points="180,350 300,95 420,350" fill="#181828" stroke="#7c9eff" stroke-width="2.5"/>
      <path d="M272,125 L300,95 L328,125 Q300,110 272,125Z" fill="#e8e8f0"/>
      <path d="M100,350 L155,268 L200,302 L255,215 L300,260 L355,228 L412,350" stroke="#3dffa0" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <circle cx="255" cy="215" r="8" fill="#3dffa0"/>
    </svg>
  </div>
  <p class="logo-title">MONTAGNETTE</p>
  <p class="logo-sub">TRAIL · PERFORMANCE</p>
  <button class="connect-btn" onclick="connectStrava()">
    <svg viewBox="0 0 24 24" fill="white"><path d="M15.387 17.944l-2.089-4.116h-3.065L15.387 24l5.15-10.172h-3.066m-7.008-5.599l2.836 5.598h4.172L10.463 0l-7 13.828h4.169"/></svg>
    Se connecter avec Strava
  </button>
  <p class="login-note">Lecture seule · Aucune donnée stockée sur un serveur</p>
</div>

<div id="app">
  <div class="topbar">
    <span class="app-name">MONT<span>AGNETTE</span></span>
    <div class="athlete-info">
      <img id="athlete-avatar" class="athlete-avatar" src="" alt="" onerror="this.style.display='none'"/>
      <span id="athlete-name" class="athlete-name"></span>
      <span class="disconnect" onclick="disconnect()">Déco.</span>
    </div>
  </div>

  <div id="page-home" class="page on">
    <div id="home-content"><div class="loader"><div class="spinner"></div><p class="loader-text">Chargement de tes activités...</p></div></div>
  </div>

  <div id="page-objectifs" class="page">
    <div id="obj-list"></div>
    <div class="card">
      <p class="card-title">Ajouter un objectif</p>
      <div class="form-group"><label class="form-label">Nom de la course</label><input class="form-input" id="obj-name" placeholder="Ex: Trail des Crêtes 2026"/></div>
      <div class="form-group"><label class="form-label">Date</label><input class="form-input" id="obj-date" type="date"/></div>
      <div class="form-row2">
        <div class="form-group"><label class="form-label">Distance (km)</label><input class="form-input" id="obj-dist" type="number" placeholder="33"/></div>
        <div class="form-group"><label class="form-label">Dénivelé (m D+)</label><input class="form-input" id="obj-deniv" type="number" placeholder="1800"/></div>
      </div>
      <div class="form-row2">
        <div class="form-group"><label class="form-label">Type</label>
          <select class="form-select" id="obj-type"><option value="trail">Trail</option><option value="route">Route</option><option value="velo">Vélo</option></select>
        </div>
        <div class="form-group"><label class="form-label">Priorité</label>
          <select class="form-select" id="obj-prio"><option value="A">A — Principal</option><option value="B">B — Secondaire</option><option value="C">C — Découverte</option></select>
        </div>
      </div>
      <button class="add-btn" onclick="addObjectif()">+ Enregistrer l'objectif</button>
    </div>
  </div>

  <div id="page-activites" class="page">
    <div id="act-content"><div class="loader"><div class="spinner"></div><p class="loader-text">Chargement...</p></div></div>
  </div>

  <div id="page-zones" class="page">
    <div id="zones-content"><div class="loader"><div class="spinner"></div><p class="loader-text">Chargement...</p></div></div>
  </div>

  <div id="page-profil" class="page">
    <div id="profil-content"><div class="loader"><div class="spinner"></div><p class="loader-text">Chargement...</p></div></div>
  </div>

  <nav class="bottom-nav">
    <button class="nav-btn on" onclick="showPage('home',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>
      <span>Home</span>
    </button>
    <button class="nav-btn" onclick="showPage('objectifs',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 17l3-5 3 4 3-7 3 4 3-3"/></svg>
      <span>Objectifs</span>
    </button>
    <button class="nav-btn" onclick="showPage('activites',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M7 4V2m10 2V2M3 9h18"/></svg>
      <span>Activités</span>
    </button>
    <button class="nav-btn" onclick="showPage('zones',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 14l4-5 4 6 4-10 4 6 3-3"/></svg>
      <span>Zones</span>
    </button>
    <button class="nav-btn" onclick="showPage('profil',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
      <span>Profil</span>
    </button>
  </nav>
</div>

<script>
const CLIENT_ID    = '225769';
const WORKER_URL   = 'https://dashboard-oauth.biancone-theo.workers.dev';
const REDIRECT_URI = WORKER_URL + '/callback';

// ── AUTH ──────────────────────────────────────────────────
function connectStrava(){ window.location.href=`https://www.strava.com/oauth/authorize?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&response_type=code&scope=read,activity:read`; }
function disconnect(){ localStorage.removeItem('strava_token'); localStorage.removeItem('strava_athlete'); location.reload(); }
function getToken(){ return localStorage.getItem('strava_token'); }
function getAthlete(){ try{ return JSON.parse(localStorage.getItem('strava_athlete')||'null'); }catch(e){ return null; } }

async function handleCallback(){
  const params=new URLSearchParams(window.location.search);
  const code=params.get('code'); if(!code) return false;
  history.replaceState({},'',window.location.pathname);
  try{ const res=await fetch(`${WORKER_URL}/token?code=${code}`); const data=await res.json(); if(data.access_token){ localStorage.setItem('strava_token',data.access_token); localStorage.setItem('strava_athlete',JSON.stringify(data.athlete)); return true; } }catch(e){}
  return false;
}

// ── API ────────────────────────────────────────────────────
async function fetchAllActivities(){
  const cached=localStorage.getItem('activities_cache');
  const age=(Date.now()-parseInt(localStorage.getItem('activities_cache_time')||'0'))/60000;
  if(cached&&age<30) return JSON.parse(cached);
  let all=[],page=1,go=true;
  while(go){
    const res=await fetch(`https://www.strava.com/api/v3/athlete/activities?per_page=100&page=${page}`,{headers:{Authorization:'Bearer '+getToken()}});
    if(!res.ok) break;
    const d=await res.json(); if(!d.length){go=false;break;}
    all=all.concat(d); if(d.length<100) go=false; page++; if(page>10) go=false;
  }
  localStorage.setItem('activities_cache',JSON.stringify(all));
  localStorage.setItem('activities_cache_time',Date.now().toString());
  return all;
}

async function fetchAthleteStats(){
  const a=getAthlete(); if(!a) return null;
  try{ const r=await fetch(`https://www.strava.com/api/v3/athletes/${a.id}/stats`,{headers:{Authorization:'Bearer '+getToken()}}); return r.ok?r.json():null; }catch(e){ return null; }
}

// ── HELPERS ───────────────────────────────────────────────
function actType(a){
  const t=(a.sport_type||a.type||'').toLowerCase();
  if(t.includes('run')||t.includes('trail')) return 'run';
  if(t.includes('ride')||t.includes('cycl')||t.includes('bike')) return 'bike';
  if(t.includes('weight')||t.includes('strength')||t.includes('muscul')) return 'strength';
  if(t.includes('yoga')||t.includes('stretch')) return 'yoga';
  if(t.includes('walk')||t.includes('hike')) return 'walk';
  return 'other';
}
function typeColor(t){ return {run:'#7c9eff',bike:'#ffc04d',strength:'#3dffa0',yoga:'#d09aff',walk:'#aec4ff',other:'#7878a0'}[t]||'#7878a0'; }
function typeName(t){ return {run:'Course',bike:'Vélo',strength:'Musculation',yoga:'Yoga',walk:'Marche',other:'Entraînement'}[t]||'Autre'; }
function fcZone(fc,max){ const p=fc/max; if(p<0.6) return {z:'Z1',color:'#4a6bff',bg:'rgba(74,107,255,0.12)'}; if(p<0.7) return {z:'Z2',color:'#7c9eff',bg:'rgba(124,158,255,0.12)'}; if(p<0.8) return {z:'Z3',color:'#3dffa0',bg:'rgba(61,255,160,0.12)'}; if(p<0.9) return {z:'Z4',color:'#ffc04d',bg:'rgba(255,192,77,0.12)'}; return {z:'Z5',color:'#ff7070',bg:'rgba(255,112,112,0.12)'}; }
function fmtDist(m){ return (m/1000).toFixed(1)+' km'; }
function fmtTime(s){ const h=Math.floor(s/3600),m=Math.floor((s%3600)/60); return h>0?`${h}h${String(m).padStart(2,'0')}`:`${m} min`; }
function fmtPace(m,s){ if(!m||!s) return ''; const spk=s/(m/1000),pm=Math.floor(spk/60),ps=Math.round(spk%60); return `${pm}'${String(ps).padStart(2,'0')}''/km`; }
function daysUntil(d){ return Math.ceil((new Date(d)-new Date())/86400000); }

function getLast7(activities){
  const cutoff=new Date(); cutoff.setDate(cutoff.getDate()-7); cutoff.setHours(0,0,0,0);
  return activities.filter(a=>new Date(a.start_date)>=cutoff);
}

function getWeekStart(offsetWeeks=0){ const n=new Date(),m=new Date(n); m.setDate(n.getDate()-((n.getDay()+6)%7)-offsetWeeks*7); m.setHours(0,0,0,0); return m; }
function getWeekEnd(s){ const e=new Date(s); e.setDate(s.getDate()+7); return e; }

function calcCharge(activities){
  const now=new Date(); const recent=[],older=[];
  activities.forEach(a=>{ const diff=(now-new Date(a.start_date))/86400000; const load=(a.moving_time||0)/60*(a.average_heartrate?a.average_heartrate/150:0.7); if(diff<=7) recent.push(load); else if(diff<=35) older.push(load); });
  const rec=recent.reduce((s,v)=>s+v,0); const oldAvg=older.length?older.reduce((s,v)=>s+v,0)/4:rec||1;
  return { ratio:Math.round((oldAvg>0?rec/oldAvg:1)*100)/100 };
}

function calcZoneDistrib(activities){
  const fcMax=parseInt(localStorage.getItem('fc_max')||'190');
  const runs=activities.filter(a=>actType(a)==='run'&&a.average_heartrate);
  const z={Z1:0,Z2:0,Z3:0,Z4:0,Z5:0};
  runs.forEach(a=>{ z[fcZone(a.average_heartrate,fcMax).z]++; });
  const tot=Object.values(z).reduce((s,v)=>s+v,0)||1;
  return Object.fromEntries(Object.entries(z).map(([k,v])=>[k,Math.round(v/tot*100)]));
}

function getWeeklyData(activities,n=8){
  return Array.from({length:n},(_,i)=>{
    const s=getWeekStart(n-1-i),e=getWeekEnd(s);
    const wRuns=activities.filter(a=>{ const d=new Date(a.start_date); return d>=s&&d<e&&actType(a)==='run'; });
    const km=wRuns.reduce((sum,a)=>sum+(a.distance||0)/1000,0);
    const hrs=wRuns.reduce((sum,a)=>sum+(a.moving_time||0)/3600,0);
    return {label:`S${i+1}`,km:Math.round(km*10)/10,hrs:Math.round(hrs*10)/10};
  });
}

function getObjectifs(){ try{ return JSON.parse(localStorage.getItem('objectifs')||'[]'); }catch(e){ return []; } }
function saveObjectifs(l){ localStorage.setItem('objectifs',JSON.stringify(l)); }
function addObjectif(){
  const name=document.getElementById('obj-name').value.trim();
  const date=document.getElementById('obj-date').value;
  const dist=parseFloat(document.getElementById('obj-dist').value)||0;
  const deniv=parseFloat(document.getElementById('obj-deniv').value)||0;

  if(!name||!date){ alert('Nom et date requis.'); return; }
  const l=getObjectifs(); l.push({id:Date.now(),name,date,dist,deniv,type,prio});
  l.sort((a,b)=>new Date(a.date)-new Date(b.date)); saveObjectifs(l);
  ['obj-name','obj-date','obj-dist','obj-deniv'].forEach(id=>document.getElementById(id).value='');

}

  let zRows='';
  ['Z1','Z2','Z3','Z4','Z5'].forEach(z=>{
    const pct=zDist[z]||0;
    const ranges={Z1:'< 114',Z2:'114–133',Z3:'133–152',Z4:'152–171',Z5:'> 171'};
    zRows+=`<div class="zrow"><span class="zl">${z}</span><div class="zbg"><div class="zf" style="width:${pct}%;background:${zColors[z]};"></div></div><span style="font-size:11px;color:var(--t3);width:64px;text-align:right;flex-shrink:0;">${ranges[z]} bpm</span><span class="zp">${pct}%</span></div>`;
  });
  const z2z3=(zDist.Z1||0)+(zDist.Z2||0)+(zDist.Z3||0);
  const coachZ=z2z3<50?`Tu passes ${100-z2z3}% en Z4–Z5. Cible 70–80% en Z1–Z3 pour progresser sur trail.`:`Bonne base aérobie à ${z2z3}% en Z1–Z3. Continue sur cette lancée.`;

  const getWeekZ2=(n)=>{
    const labels=[],vals=[];
    for(let i=n-1;i>=0;i--){
      const s=getWeekStart(i),e=getWeekEnd(s);
      const wr=runs.filter(a=>{ const d=new Date(a.start_date); return d>=s&&d<e; });
      const z2n=wr.filter(a=>{ const p=a.average_heartrate/fcMax; return p>=0.6&&p<0.7; }).length;
      labels.push(`S${n-i}`); vals.push(Math.round(z2n/(wr.length||1)*100));
    }
    return {labels,vals};
  };
  const {labels,vals}=getWeekZ2(8);

  document.getElementById('zones-content').innerHTML=`
    <div class="row3">
      <div class="mc b"><p class="mc-v">${fcMoy||'—'}</p><p class="mc-l">FC moy course</p></div>
      <div class="mc g"><p class="mc-v">${fcMax}</p><p class="mc-l">FC max</p></div>
      <div class="mc ${(zDist.Z4||0)>40?'r':'a'}"><p class="mc-v">${Object.entries(zDist).sort((a,b)=>b[1]-a[1])[0]?.[0]||'—'}</p><p class="mc-l">Zone dom.</p></div>

    <div class="card"><span class="slbl">Répartition cumulée — ${runs.length} sorties FC</span>${zRows}<div class="cbox ${z2z3<50?'warn':'ok'}"><p class="ct">${coachZ}</p></div></div>
    <div class="card"><span class="slbl">% Z2 par semaine — 8 semaines</span><div class="chart-wrap-sm"><canvas id="z2-chart" role="img" aria-label="Évolution Z2">Zone 2 par semaine.</canvas></div></div>
    <div class="card">
      <span class="slbl">FC max personnalisée</span>
      <div style="display:flex;gap:10px;align-items:center;">
        <input id="fc-max-input" class="form-input" type="number" value="${fcMax}" style="flex:1;"/>
        <button class="add-btn" style="width:auto;padding:0 18px;" onclick="saveFcMax()">Enregistrer</button>
      </div>
      <p style="font-size:12px;color:var(--t3);margin-top:8px;">FC max observée : 190 bpm. Modifie si tu as une mesure plus récente.</p>
    </div>`;

  setTimeout(()=>{
    const ctx2=document.getElementById('z2-chart'); if(!ctx2) return;
    new Chart(ctx2,{ type:'line', data:{ labels, datasets:[{ data:vals, borderColor:'#3dffa0', backgroundColor:'rgba(61,255,160,0.07)', tension:.4, pointRadius:4, pointBackgroundColor:'#3dffa0', fill:true }] }, options:{ responsive:true, maintainAspectRatio:false, plugins:{ legend:{display:false}, tooltip:{callbacks:{label:c=>c.parsed.y+'%'}} }, scales:{ x:{grid:{display:false},ticks:{color:'#7878a0',font:{size:11}}}, y:{grid:{color:'rgba(255,255,255,0.05)'},ticks:{color:'#7878a0',font:{size:11}},min:0,max:100} } } });
  },100);
}

function saveFcMax(){ const v=parseInt(document.getElementById('fc-max-input').value); if(v>100&&v<230){ localStorage.setItem('fc_max',v); localStorage.removeItem('activities_cache'); alert('FC max enregistrée : '+v+' bpm.'); location.reload(); } }

// ── RENDER PROFIL ─────────────────────────────────────────
async function renderProfil(activities){
  const athlete=getAthlete();
  const runs=activities.filter(a=>actType(a)==='run');
  const totalKm=Math.round(runs.reduce((s,a)=>s+(a.distance||0)/1000,0));
  const totalDeniv=Math.round(runs.reduce((s,a)=>s+(a.total_elevation_gain||0),0));
  const fcMax=parseInt(localStorage.getItem('fc_max')||'190');
  const paceRuns=runs.filter(a=>a.distance&&a.moving_time).slice(0,20);
  const avgPace=paceRuns.length?fmtPace(paceRuns.reduce((s,a)=>s+a.distance,0),paceRuns.reduce((s,a)=>s+a.moving_time,0)):'—';
  let statsExtra='';
  try{ const stats=await fetchAthleteStats(); if(stats){ const ar=stats.all_run_totals; statsExtra=`<div class="sline"><span class="sk">Total km Strava (all time)</span><span class="sv">${Math.round((ar.distance||0)/1000).toLocaleString('fr-FR')} km</span></div><div class="sline"><span class="sk">Total activités Strava</span><span class="sv">${(ar.count||0).toLocaleString('fr-FR')}</span></div>`; } }catch(e){}

  document.getElementById('profil-content').innerHTML=`
    <div class="card" style="display:flex;align-items:center;gap:14px;">
      <img src="${athlete?.profile_medium||''}" style="width:56px;height:56px;border-radius:50%;border:1.5px solid var(--accent);" onerror="this.style.display='none'"/>
      <div><p style="font-size:17px;font-weight:500;color:var(--t1);">${athlete?.firstname||''} ${athlete?.lastname||''}</p><p style="font-size:13px;color:var(--t2);margin-top:3px;">Strava Premium · ${athlete?.city||''}${athlete?.country?' · '+athlete.country:''}</p></div>
    </div>
    <div class="card">
      <span class="slbl">Statistiques (${activities.length} activités chargées)</span>
      <div class="sline"><span class="sk">Km course</span><span class="sv">${totalKm.toLocaleString('fr-FR')} km</span></div>
      <div class="sline"><span class="sk">D+ course total</span><span class="sv">${totalDeniv.toLocaleString('fr-FR')} m</span></div>
      <div class="sline"><span class="sk">Allure moy. (20 dernières)</span><span class="sv">${avgPace}</span></div>
      ${statsExtra}
    </div>
    <div class="card">
      <span class="slbl">Paramètres</span>
      <div class="sline"><span class="sk">FC max</span><span class="sa" onclick="showPage('zones',document.querySelectorAll('.nav-btn')[3])">${fcMax} bpm · modifier</span></div>
      <div class="sline"><span class="sk">Méthode zones</span><span class="sv">% FC max — 5 zones</span></div>
      <div class="sline"><span class="sk">Connexion Strava</span><span class="sv" style="color:var(--green);">Actif</span></div>
      <div class="sline"><span class="sk">Cache activités</span><span class="sv" style="color:var(--t3);">30 min</span></div>
    </div>
    <div class="card">
      <button onclick="localStorage.removeItem('activities_cache');localStorage.removeItem('activities_cache_time');location.reload();" style="width:100%;height:48px;border-radius:12px;background:rgba(124,158,255,0.08);border:0.5px solid rgba(124,158,255,0.3);color:var(--accent);font-size:15px;cursor:pointer;margin-bottom:10px;">Forcer la synchronisation Strava</button>
      <button onclick="disconnect()" style="width:100%;height:48px;border-radius:12px;background:rgba(255,112,112,0.07);border:0.5px solid rgba(255,112,112,0.3);color:#ff7070;font-size:15px;cursor:pointer;">Se déconnecter</button>
    </div>`;
}

// ── NAVIGATION ────────────────────────────────────────────
let allActivities=[];
function showPage(name,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('on'));
  document.getElementById('page-'+name).classList.add('on');
  if(btn) btn.classList.add('on');
  if(name==='objectifs') renderObjectifs();
  if(name==='activites'&&allActivities.length) renderActivites(allActivities);
  if(name==='zones'&&allActivities.length) renderZones(allActivities);
  if(name==='profil') renderProfil(allActivities);
}

// ── INIT ──────────────────────────────────────────────────
async function init(){
  const params=new URLSearchParams(window.location.search);
  if(params.get('access_token')){ const tok=params.get('access_token'),ath=params.get('athlete'); if(tok&&ath){ localStorage.setItem('strava_token',tok); localStorage.setItem('strava_athlete',decodeURIComponent(ath)); history.replaceState({},'',window.location.pathname); } }
  if(params.get('code')){ const ok=await handleCallback(); if(!ok){ alert('Erreur de connexion Strava.'); return; } }
  if(params.get('error')) history.replaceState({},'',window.location.pathname);

  const token=getToken(),athlete=getAthlete();
  if(!token||!athlete){ document.getElementById('login-screen').style.display='flex'; document.getElementById('app').style.display='none'; return; }

  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('athlete-name').textContent=athlete.firstname||'';
  if(athlete.profile_medium) document.getElementById('athlete-avatar').src=athlete.profile_medium;

  try{
    document.getElementById('home-content').innerHTML='<div class="loader"><div class="spinner"></div><p class="loader-text">Chargement de toutes tes activités...</p></div>';
    allActivities=await fetchAllActivities();
    renderHome(allActivities);
    renderObjectifs();
  }catch(e){
    document.getElementById('home-content').innerHTML='<div class="empty">Erreur de chargement.<br><span style="color:var(--accent);cursor:pointer;" onclick="location.reload()">Réessayer</span></div>';
  }
}

init();
</script>
</body>
</html>

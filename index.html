<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Montagnette">
<meta name="theme-color" content="#0f0f17">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="icon" type="image/png" href="icons/favicon.png">
<title>Montagnette</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root{
  --bg:#0f0f17;--bg2:#181824;--bg3:#20202e;--bg4:#2c2c3e;
  --border:rgba(255,255,255,0.09);--border2:rgba(255,255,255,0.16);
  --t1:#f0eff8;--t2:#b8b8d0;--t3:#7878a0;
  --accent:#7c9eff;--green:#3dffa0;--amber:#ffc04d;--red:#ff7070;--purple:#d09aff;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--t1);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;padding-bottom:80px;}

#login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:2rem;text-align:center;}
.logo-title{font-size:32px;font-weight:700;letter-spacing:3px;color:var(--t1);margin-bottom:4px;}
.logo-sub{font-size:12px;color:var(--accent);letter-spacing:5px;margin-bottom:3rem;}
.connect-btn{display:flex;align-items:center;gap:10px;background:#fc4c02;color:#fff;border:none;border-radius:10px;padding:14px 28px;font-size:14px;font-weight:600;cursor:pointer;}
.connect-btn:hover{background:#e04400;}
.connect-btn svg{width:20px;height:20px;}
.login-note{font-size:11px;color:var(--t3);margin-top:1.5rem;max-width:260px;line-height:1.6;}

#app{display:none;}
.topbar{background:var(--bg2);border-bottom:0.5px solid var(--border2);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.app-name{font-size:16px;font-weight:700;letter-spacing:2px;color:var(--t1);}
.app-name span{color:var(--accent);}
.athlete-info{display:flex;align-items:center;gap:8px;}
.athlete-avatar{width:30px;height:30px;border-radius:50%;border:1.5px solid var(--accent);object-fit:cover;}
.athlete-name{font-size:11px;color:var(--t2);}
.disconnect{font-size:10px;color:var(--t3);cursor:pointer;text-decoration:underline;margin-left:8px;}

.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:0.5px solid var(--border2);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom);}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 4px 8px;cursor:pointer;border:none;background:none;}
.nav-btn svg{width:18px;height:18px;stroke:var(--t3);}
.nav-btn span{font-size:9px;color:var(--t3);}
.nav-btn.on svg{stroke:var(--accent);}
.nav-btn.on span{color:var(--accent);}

.page{display:none;padding:16px;}
.page.on{display:block;}

.card{background:var(--bg2);border:0.5px solid var(--border2);border-radius:12px;padding:1rem 1.1rem;margin-bottom:12px;}
.card-title{font-size:13px;font-weight:500;color:var(--t1);margin-bottom:10px;}
.slbl{font-size:9px;color:var(--t2);font-weight:500;text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:6px;}

.row3{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:12px;}
.row2{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;margin-bottom:12px;}
.mc{border-radius:8px;padding:9px 10px;border:0.5px solid var(--border);background:var(--bg3);}
.mc-v{font-size:18px;font-weight:500;color:var(--t1);line-height:1;}
.mc-l{font-size:8px;color:var(--t2);margin-top:3px;text-transform:uppercase;letter-spacing:.04em;}
.mc.g{background:rgba(61,255,160,0.09);border-color:rgba(61,255,160,0.22);}.mc.g .mc-v{color:var(--green);}
.mc.a{background:rgba(255,192,77,0.09);border-color:rgba(255,192,77,0.22);}.mc.a .mc-v{color:var(--amber);}
.mc.b{background:rgba(124,158,255,0.09);border-color:rgba(124,158,255,0.22);}.mc.b .mc-v{color:var(--accent);}
.mc.r{background:rgba(255,112,112,0.09);border-color:rgba(255,112,112,0.22);}.mc.r .mc-v{color:var(--red);}
.mc.p{background:rgba(208,154,255,0.09);border-color:rgba(208,154,255,0.22);}.mc.p .mc-v{color:var(--purple);}

.obj-card{border-radius:10px;padding:10px 12px;margin-bottom:8px;background:var(--bg3);border:0.5px solid var(--border2);}
.obj-card.pri{border-left:2px solid var(--accent);border-radius:0 10px 10px 0;background:rgba(124,158,255,0.06);}
.obj-top{display:flex;justify-content:space-between;align-items:flex-start;gap:6px;}
.obj-name{font-size:12px;font-weight:500;color:var(--t1);}
.obj-date{font-size:9px;color:var(--t2);margin-top:2px;}
.bdg{font-size:9px;font-weight:500;padding:2px 8px;border-radius:4px;flex-shrink:0;}
.bt{background:rgba(61,255,160,0.1);color:var(--green);border:0.5px solid rgba(61,255,160,0.25);}
.br{background:rgba(124,158,255,0.1);color:var(--accent);border:0.5px solid rgba(124,158,255,0.25);}
.cdown{font-size:26px;font-weight:500;color:var(--accent);margin:5px 0 4px;letter-spacing:-.02em;}
.pb{height:4px;border-radius:2px;background:var(--bg4);overflow:hidden;margin-bottom:3px;}
.pf{height:100%;border-radius:2px;background:var(--accent);}
.plr{display:flex;justify-content:space-between;}
.pl{font-size:8px;color:var(--t2);}
.pl.hi{color:var(--accent);}

/* Semaine plan */
.plan-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:8px;}
.plan-mc{border-radius:7px;padding:7px 8px;background:var(--bg3);border:0.5px solid var(--border);}
.plan-v{font-size:14px;font-weight:500;color:var(--t1);line-height:1;}
.plan-l{font-size:8px;color:var(--t2);margin-top:2px;}
.plan-ok .plan-v{color:var(--green);}
.plan-warn .plan-v{color:var(--amber);}

.wdots{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:6px;}
.wd{aspect-ratio:1;border-radius:4px;background:var(--bg3);}
.wd-r{background:var(--accent);opacity:.85;}
.wd-s{background:var(--green);opacity:.75;}
.wd-b{background:var(--amber);opacity:.75;}
.wd-y{background:var(--purple);opacity:.75;}
.wd-today{outline:1.5px solid var(--accent);}
.leg{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px;}
.li{display:flex;align-items:center;gap:4px;font-size:9px;color:var(--t2);}
.ld{width:7px;height:7px;border-radius:50%;}

.zrow{display:flex;align-items:center;gap:6px;margin-bottom:5px;}
.zl{font-size:9px;color:var(--t2);width:16px;}
.zbg{flex:1;height:5px;border-radius:3px;background:var(--bg3);overflow:hidden;}
.zf{height:100%;border-radius:3px;}
.zp{font-size:9px;color:var(--t2);width:26px;text-align:right;}

.act-item{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:0.5px solid var(--border);}
.act-item:last-child{border-bottom:none;}
.act-dot{width:7px;height:7px;border-radius:50%;margin-right:9px;flex-shrink:0;}
.act-name{font-size:11px;font-weight:500;color:var(--t1);}
.act-meta{font-size:9px;color:var(--t2);margin-top:2px;line-height:1.4;}
.act-badge{font-size:9px;font-weight:500;padding:2px 7px;border-radius:4px;flex-shrink:0;}

/* Charge / forme */
.charge-indicator{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.charge-bar-bg{flex:1;height:8px;border-radius:4px;background:var(--bg3);overflow:hidden;}
.charge-bar-fill{height:100%;border-radius:4px;}

.cbox{background:rgba(124,158,255,0.07);border:0.5px solid rgba(124,158,255,0.2);border-radius:8px;padding:9px 11px;margin-top:8px;}
.ct{font-size:10px;color:#aec4ff;line-height:1.55;}
.cbox.warn{background:rgba(255,192,77,0.07);border-color:rgba(255,192,77,0.2);}
.cbox.warn .ct{color:#ffc04d;}
.cbox.ok{background:rgba(61,255,160,0.07);border-color:rgba(61,255,160,0.2);}
.cbox.ok .ct{color:#3dffa0;}

.form-group{margin-bottom:10px;}
.form-label{font-size:10px;color:var(--t2);text-transform:uppercase;letter-spacing:.04em;display:block;margin-bottom:4px;}
.form-input{width:100%;background:var(--bg3);border:0.5px solid var(--border2);border-radius:8px;padding:9px 11px;font-size:13px;color:var(--t1);outline:none;}
.form-input:focus{border-color:var(--accent);}
.form-row2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.form-select{width:100%;background:var(--bg3);border:0.5px solid var(--border2);border-radius:8px;padding:9px 11px;font-size:13px;color:var(--t1);outline:none;}
.add-btn{width:100%;height:40px;border-radius:10px;background:rgba(124,158,255,0.15);border:0.5px solid var(--accent);color:var(--accent);font-size:13px;font-weight:500;cursor:pointer;margin-top:4px;}

.sline{display:flex;justify-content:space-between;padding:7px 0;border-bottom:0.5px solid var(--border);align-items:center;}
.sline:last-child{border-bottom:none;}
.sk{font-size:11px;color:var(--t2);}
.sv{font-size:11px;font-weight:500;color:var(--t1);}
.su{font-size:10px;color:var(--green);margin-left:4px;}
.sa{font-size:11px;font-weight:500;color:var(--accent);cursor:pointer;}

.chart-wrap{position:relative;width:100%;height:160px;margin-bottom:4px;}
.chart-wrap-sm{position:relative;width:100%;height:130px;margin-bottom:4px;}

.loader{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:3rem;gap:12px;}
.spinner{width:32px;height:32px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loader-text{font-size:12px;color:var(--t2);}
.empty{text-align:center;padding:2rem;color:var(--t3);font-size:12px;line-height:1.6;}

.install-banner{background:rgba(124,158,255,0.08);border:0.5px solid rgba(124,158,255,0.2);border-radius:10px;padding:10px 13px;margin-bottom:12px;display:flex;align-items:center;gap:10px;}
.install-banner p{font-size:11px;color:#aec4ff;line-height:1.5;flex:1;}
.install-banner button{font-size:10px;color:var(--accent);background:none;border:0.5px solid var(--accent);border-radius:6px;padding:5px 10px;cursor:pointer;flex-shrink:0;}
</style>
</head>
<body>

<div id="login-screen">
  <div style="margin-bottom:2rem;">
    <svg width="80" height="80" viewBox="0 0 512 512" style="border-radius:18px;">
      <rect width="512" height="512" fill="#0f0f17"/>
      <polygon points="100,350 200,145 300,350" fill="#141422" stroke="#4a6bff" stroke-width="2"/>
      <polygon points="180,350 300,95 420,350" fill="#181828" stroke="#7c9eff" stroke-width="2.5"/>
      <path d="M272,125 L300,95 L328,125 Q300,110 272,125Z" fill="#e8e8f0"/>
      <path d="M100,350 L155,268 L200,302 L255,215 L300,260 L355,228 L412,350" stroke="#3dffa0" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <circle cx="255" cy="215" r="8" fill="#3dffa0"/>
    </svg>
  </div>
  <p class="logo-title">MONTAGNETTE</p>
  <p class="logo-sub">TRAIL · PERFORMANCE</p>
  <button class="connect-btn" onclick="connectStrava()">
    <svg viewBox="0 0 24 24" fill="white"><path d="M15.387 17.944l-2.089-4.116h-3.065L15.387 24l5.15-10.172h-3.066m-7.008-5.599l2.836 5.598h4.172L10.463 0l-7 13.828h4.169"/></svg>
    Se connecter avec Strava
  </button>
  <p class="login-note">Lecture seule · Aucune donnée stockée sur un serveur</p>
</div>

<div id="app">
  <div class="topbar">
    <span class="app-name">MONT<span>AGNETTE</span></span>
    <div class="athlete-info">
      <img id="athlete-avatar" class="athlete-avatar" src="" alt="" onerror="this.style.display='none'"/>
      <span id="athlete-name" class="athlete-name"></span>
      <span class="disconnect" onclick="disconnect()">Déco.</span>
    </div>
  </div>

  <div id="page-home" class="page on">
    <div id="home-content"><div class="loader"><div class="spinner"></div><p class="loader-text">Chargement de tes activités...</p></div></div>
  </div>

  <div id="page-objectifs" class="page">
    <div id="obj-list"></div>
    <div class="card">
      <p class="card-title">Ajouter un objectif</p>
      <div class="form-group"><label class="form-label">Nom de la course</label><input class="form-input" id="obj-name" placeholder="Ex: Trail des Crêtes 2026"/></div>
      <div class="form-group"><label class="form-label">Date</label><input class="form-input" id="obj-date" type="date"/></div>
      <div class="form-row2">
        <div class="form-group"><label class="form-label">Distance (km)</label><input class="form-input" id="obj-dist" type="number" placeholder="33"/></div>
        <div class="form-group"><label class="form-label">Dénivelé (m D+)</label><input class="form-input" id="obj-deniv" type="number" placeholder="1800"/></div>
      </div>
      <div class="form-row2">
        <div class="form-group"><label class="form-label">Type</label>
          <select class="form-select" id="obj-type"><option value="trail">Trail</option><option value="route">Route</option><option value="velo">Vélo</option></select>
        </div>
        <div class="form-group"><label class="form-label">Priorité</label>
          <select class="form-select" id="obj-prio"><option value="A">A — Principal</option><option value="B">B — Secondaire</option><option value="C">C — Découverte</option></select>
        </div>
      </div>
      <button class="add-btn" onclick="addObjectif()">+ Enregistrer l'objectif</button>
    </div>
  </div>

  <div id="page-activites" class="page">
    <div id="act-content"><div class="loader"><div class="spinner"></div><p class="loader-text">Chargement...</p></div></div>
  </div>

  <div id="page-zones" class="page">
    <div id="zones-content"><div class="loader"><div class="spinner"></div><p class="loader-text">Chargement...</p></div></div>
  </div>

  <div id="page-profil" class="page">
    <div id="profil-content"><div class="loader"><div class="spinner"></div><p class="loader-text">Chargement...</p></div></div>
  </div>

  <nav class="bottom-nav">
    <button class="nav-btn on" onclick="showPage('home',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>
      <span>Home</span>
    </button>
    <button class="nav-btn" onclick="showPage('objectifs',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 17l3-5 3 4 3-7 3 4 3-3"/></svg>
      <span>Objectifs</span>
    </button>
    <button class="nav-btn" onclick="showPage('activites',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M7 4V2m10 2V2M3 9h18"/></svg>
      <span>Activités</span>
    </button>
    <button class="nav-btn" onclick="showPage('zones',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 14l4-5 4 6 4-10 4 6 3-3"/></svg>
      <span>Zones</span>
    </button>
    <button class="nav-btn" onclick="showPage('profil',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
      <span>Profil</span>
    </button>
  </nav>
</div>

<script>
const CLIENT_ID    = '225769';
const WORKER_URL   = 'https://dashboard-oauth.biancone-theo.workers.dev';
const REDIRECT_URI = WORKER_URL + '/callback';

// ── AUTH ──────────────────────────────────────────────────
function connectStrava(){
  window.location.href = `https://www.strava.com/oauth/authorize?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&response_type=code&scope=read,activity:read`;
}
function disconnect(){ localStorage.removeItem('strava_token'); localStorage.removeItem('strava_athlete'); location.reload(); }
function getToken(){ return localStorage.getItem('strava_token'); }
function getAthlete(){ try{ return JSON.parse(localStorage.getItem('strava_athlete')||'null'); }catch(e){ return null; } }

async function handleCallback(){
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  if(!code) return false;
  history.replaceState({},'',window.location.pathname);
  try{
    const res  = await fetch(`${WORKER_URL}/token?code=${code}`);
    const data = await res.json();
    if(data.access_token){ localStorage.setItem('strava_token',data.access_token); localStorage.setItem('strava_athlete',JSON.stringify(data.athlete)); return true; }
  }catch(e){}
  return false;
}

// ── API avec pagination complète ──────────────────────────
async function fetchAllActivities(){
  const cached = localStorage.getItem('activities_cache');
  const cacheTime = parseInt(localStorage.getItem('activities_cache_time')||'0');
  const AGE = (Date.now()-cacheTime)/1000/60;
  if(cached && AGE < 30){ return JSON.parse(cached); }

  let all = [], page = 1, keepGoing = true;
  while(keepGoing){
    const res = await fetch(`https://www.strava.com/api/v3/athlete/activities?per_page=100&page=${page}`,{ headers:{ Authorization:'Bearer '+getToken() }});
    if(!res.ok) break;
    const data = await res.json();
    if(!data.length){ keepGoing = false; break; }
    all = all.concat(data);
    if(data.length < 100) keepGoing = false;
    page++;
    if(page > 10) keepGoing = false; // sécurité 1000 activités max
  }
  localStorage.setItem('activities_cache', JSON.stringify(all));
  localStorage.setItem('activities_cache_time', Date.now().toString());
  return all;
}

async function fetchAthleteStats(){
  const athlete = getAthlete();
  if(!athlete) return null;
  try{
    const res = await fetch(`https://www.strava.com/api/v3/athletes/${athlete.id}/stats`,{ headers:{ Authorization:'Bearer '+getToken() }});
    return res.ok ? res.json() : null;
  }catch(e){ return null; }
}

// ── HELPERS ───────────────────────────────────────────────
function actType(a){
  const t=(a.sport_type||a.type||'').toLowerCase();
  if(t.includes('run')||t.includes('trail')) return 'run';
  if(t.includes('ride')||t.includes('cycl')||t.includes('bike')||t.includes('velo')) return 'bike';
  if(t.includes('weight')||t.includes('strength')||t.includes('muscul')) return 'strength';
  if(t.includes('yoga')||t.includes('stretch')) return 'yoga';
  if(t.includes('walk')||t.includes('hike')) return 'walk';
  return 'other';
}
function typeColor(t){ return {run:'#7c9eff',bike:'#ffc04d',strength:'#3dffa0',yoga:'#d09aff',walk:'#aec4ff',other:'#7878a0'}[t]||'#7878a0'; }
function typeName(t){ return {run:'Course',bike:'Vélo',strength:'Musculation',yoga:'Yoga',walk:'Marche',other:'Entraînement'}[t]||'Autre'; }
function fcZone(fc,max){ const p=fc/max; if(p<0.6) return {z:'Z1',color:'#4a6bff',bg:'rgba(74,107,255,0.12)'}; if(p<0.7) return {z:'Z2',color:'#7c9eff',bg:'rgba(124,158,255,0.12)'}; if(p<0.8) return {z:'Z3',color:'#3dffa0',bg:'rgba(61,255,160,0.12)'}; if(p<0.9) return {z:'Z4',color:'#ffc04d',bg:'rgba(255,192,77,0.12)'}; return {z:'Z5',color:'#ff7070',bg:'rgba(255,112,112,0.12)'}; }
function fmtDist(m){ return (m/1000).toFixed(1)+' km'; }
function fmtTime(s){ const h=Math.floor(s/3600),m=Math.floor((s%3600)/60); return h>0?`${h}h${String(m).padStart(2,'0')}`:`${m} min`; }
function fmtPace(m,s){ if(!m||!s) return ''; const secPerKm=s/(m/1000); const pm=Math.floor(secPerKm/60),ps=Math.round(secPerKm%60); return `${pm}'${String(ps).padStart(2,'0')}''/km`; }
function daysUntil(d){ return Math.ceil((new Date(d)-new Date())/86400000); }

function getWeekStart(offsetWeeks=0){
  const now=new Date(); const mon=new Date(now);
  mon.setDate(now.getDate()-((now.getDay()+6)%7)-offsetWeeks*7); mon.setHours(0,0,0,0); return mon;
}
function getWeekEnd(start){ const e=new Date(start); e.setDate(start.getDate()+7); return e; }

// Charge réelle : ratio TSS simplifié basé sur durée + FC
function calcCharge(activities, weeks=4){
  const now=new Date();
  const recent=[], older=[];
  activities.forEach(a=>{
    const d=new Date(a.start_date);
    const diff=(now-d)/86400000;
    const load=(a.moving_time||0)/60 * (a.average_heartrate ? a.average_heartrate/150 : 0.7);
    if(diff<=7) recent.push(load);
    else if(diff<=7+weeks*7) older.push(load);
  });
  const recSum=recent.reduce((s,v)=>s+v,0);
  const oldAvg=older.length ? older.reduce((s,v)=>s+v,0)/(weeks) : recSum||1;
  const ratio=oldAvg>0 ? recSum/oldAvg : 1;
  return { recent:Math.round(recSum), avg:Math.round(oldAvg), ratio:Math.round(ratio*100)/100 };
}

function calcZoneDistrib(activities){
  const fcMax=parseInt(localStorage.getItem('fc_max')||'190');
  const runs=activities.filter(a=>actType(a)==='run'&&a.average_heartrate);
  const z={Z1:0,Z2:0,Z3:0,Z4:0,Z5:0};
  runs.forEach(a=>{ const zn=fcZone(a.average_heartrate,fcMax).z; z[zn]++; });
  const tot=Object.values(z).reduce((s,v)=>s+v,0)||1;
  return Object.fromEntries(Object.entries(z).map(([k,v])=>[k,Math.round(v/tot*100)]));
}

function getWeeklyRunKm(activities, n=8){
  return Array.from({length:n},(_,i)=>{
    const s=getWeekStart(n-1-i), e=getWeekEnd(s);
    const km=activities.filter(a=>{ const d=new Date(a.start_date); return d>=s&&d<e&&actType(a)==='run'; }).reduce((sum,a)=>sum+(a.distance||0)/1000,0);
    const sess=activities.filter(a=>{ const d=new Date(a.start_date); return d>=s&&d<e&&actType(a)==='strength'; }).length;
    return {label:`S${i+1}`,km:Math.round(km*10)/10,strength:sess};
  });
}

function renderZones(activities){
  const fcMax=parseInt(localStorage.getItem('fc_max')||'190');

  const zDist=calcZoneDistrib(activities);
  const fcMoy=runs.length?Math.round(runs.reduce((s,a)=>s+a.average_heartrate,0)/runs.length):0;
  const zColors={Z1:'#4a6bff',Z2:'#7c9eff',Z3:'#3dffa0',Z4:'#ffc04d',Z5:'#ff7070'};

  let zRows='';
  ['Z1','Z2','Z3','Z4','Z5'].forEach(z=>{
    const pct=zDist[z]||0;
    const ranges={Z1:'<114',Z2:'114–133',Z3:'133–152',Z4:'152–171',Z5:'>171'};
    zRows+=`<div class="zrow">
      <span class="zl">${z}</span>
      <div class="zbg"><div class="zf" style="width:${pct}%;background:${zColors[z]};"></div></div>
      <span style="font-size:8px;color:var(--t3);width:56px;text-align:right;flex-shrink:0;">${ranges[z]} bpm</span>
      <span class="zp">${pct}%</span>
    </div>`;
  });

  const z2z3=(zDist.Z1||0)+(zDist.Z2||0)+(zDist.Z3||0);
  const coachZ=z2z3<50?`Tu passes ${100-z2z3}% en Z4–Z5. Cible 70–80% en Z1–Z3 pour progresser sur trail.`:`Bonne base aérobie à ${z2z3}% en Z1–Z3. Continue sur cette lancée.`;

  // Z2 sur 8 semaines
  const getWeekZ2=(n)=>{
    const labels=[],vals=[];
    for(let i=n-1;i>=0;i--){
      const s=getWeekStart(i), e=getWeekEnd(s);
      const wRuns=runs.filter(a=>{ const d=new Date(a.start_date); return d>=s&&d<e; });
      const z2n=wRuns.filter(a=>{ const p=a.average_heartrate/fcMax; return p>=0.6&&p<0.7; }).length;
      const tot=wRuns.length||1;
      labels.push(`S${n-i}`); vals.push(Math.round(z2n/tot*100));
    }
    return {labels,vals};
  };
  const {labels,vals}=getWeekZ2(8);

  document.getElementById('zones-content').innerHTML=`
    <div class="row3">
      <div class="mc b"><p class="mc-v">${fcMoy||'—'}</p><p class="mc-l">FC moy course</p></div>
      <div class="mc g"><p class="mc-v">${fcMax}</p><p class="mc-l">FC max</p></div>
      <div class="mc ${(zDist.Z4||0)>40?'r':'a'}"><p class="mc-v">${Object.entries(zDist).sort((a,b)=>b[1]-a[1])[0]?.[0]||'—'}</p><p class="mc-l">Zone dom.</p></div>
    </div>
    <div class="card">
      <span class="slbl">Répartition cumulée — ${runs.length} sorties avec FC</span>
      ${zRows}
      <div class="cbox ${z2z3<50?'warn':'ok'}"><p class="ct">${coachZ}</p></div>
    </div>
    <div class="card">
      <span class="slbl">% Z2 par semaine — 8 semaines</span>
      <div class="chart-wrap-sm"><canvas id="z2-chart" role="img" aria-label="Évolution Z2 sur 8 semaines">Évolution zone 2.</canvas></div>
    </div>
    <div class="card">
      <span class="slbl">FC max personnalisée</span>
      <div style="display:flex;gap:8px;align-items:center;">
        <input id="fc-max-input" class="form-input" type="number" value="${fcMax}" style="flex:1;"/>
        <button class="add-btn" style="width:auto;padding:0 16px;" onclick="saveFcMax()">Enregistrer</button>
      </div>
      <p style="font-size:9px;color:var(--t3);margin-top:6px;">Ta FC max observée est 190 bpm. Modifie si tu as une mesure plus récente.</p>
    </div>`;

  setTimeout(()=>{
    const ctx2=document.getElementById('z2-chart');
    if(ctx2) new Chart(ctx2,{
      type:'line',
      data:{ labels, datasets:[{ data:vals, borderColor:'#3dffa0', backgroundColor:'rgba(61,255,160,0.07)', tension:.4, pointRadius:3, pointBackgroundColor:'#3dffa0', fill:true }] },
      options:{ responsive:true, maintainAspectRatio:false, plugins:{ legend:{display:false}, tooltip:{callbacks:{label:c=>c.parsed.y+'%'}} }, scales:{ x:{grid:{display:false},ticks:{color:'#7878a0',font:{size:10}}}, y:{grid:{color:'rgba(255,255,255,0.05)'},ticks:{color:'#7878a0',font:{size:10}},min:0,max:100} } }
    });
  },100);
}

  const fcMax=parseInt(localStorage.getItem('fc_max')||'190');
  const paceRuns=runs.filter(a=>a.distance&&a.moving_time).slice(0,20);
  const avgPace=paceRuns.length?fmtPace(paceRuns.reduce((s,a)=>s+a.distance,0),paceRuns.reduce((s,a)=>s+a.moving_time,0)):'—';

  let statsExtra='';
  try{
    const stats=await fetchAthleteStats();
    if(stats){ const ar=stats.all_run_totals; statsExtra=`<div class="sline"><span class="sk">Total km Strava (all time)</span><span class="sv">${Math.round((ar.distance||0)/1000).toLocaleString('fr-FR')} km</span></div><div class="sline"><span class="sk">Total activités Strava</span><span class="sv">${(ar.count||0).toLocaleString('fr-FR')}</span></div>`; }
  }catch(e){}

  document.getElementById('profil-content').innerHTML=`
    <div class="card" style="display:flex;align-items:center;gap:12px;">
      <img src="${athlete?.profile_medium||''}" style="width:52px;height:52px;border-radius:50%;border:1.5px solid var(--accent);" onerror="this.style.display='none'"/>
      <div><p style="font-size:15px;font-weight:500;color:var(--t1);">${athlete?.firstname||''} ${athlete?.lastname||''}</p><p style="font-size:10px;color:var(--t2);margin-top:2px;">Strava Premium · ${athlete?.city||''}${athlete?.country?' · '+athlete.country:''}</p></div>
    </div>
    <div class="card">
      <span class="slbl">Statistiques chargées (${activities.length} activités)</span>
      <div class="sline"><span class="sk">Km course</span><span class="sv">${totalKm.toLocaleString('fr-FR')} km</span></div>
      <div class="sline"><span class="sk">D+ course total</span><span class="sv">${totalDeniv.toLocaleString('fr-FR')} m</span></div>
      <div class="sline"><span class="sk">Allure moy. (20 dernières)</span><span class="sv">${avgPace}</span></div>
      ${statsExtra}
    </div>
    <div class="card">
      <span class="slbl">Paramètres</span>
      <div class="sline"><span class="sk">FC max</span><span class="sa" onclick="showPage('zones',document.querySelectorAll('.nav-btn')[3])">${fcMax} bpm · modifier</span></div>
      <div class="sline"><span class="sk">Méthode zones</span><span class="sv">% FC max (5 zones)</span></div>
      <div class="sline"><span class="sk">Connexion Strava</span><span class="sv" style="color:var(--green);">Actif</span></div>
      <div class="sline"><span class="sk">Cache activités</span><span class="sv" style="color:var(--t3);">30 min</span></div>
    </div>
    <div class="card">
      <button onclick="localStorage.removeItem('activities_cache');localStorage.removeItem('activities_cache_time');location.reload();" style="width:100%;height:36px;border-radius:8px;background:rgba(124,158,255,0.08);border:0.5px solid rgba(124,158,255,0.3);color:var(--accent);font-size:12px;cursor:pointer;margin-bottom:8px;">Forcer la synchronisation Strava</button>
      <button onclick="disconnect()" style="width:100%;height:36px;border-radius:8px;background:rgba(255,112,112,0.07);border:0.5px solid rgba(255,112,112,0.3);color:#ff7070;font-size:12px;cursor:pointer;">Se déconnecter</button>
    </div>`;
}

// ── NAVIGATION ────────────────────────────────────────────
let allActivities=[];
function showPage(name,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('on'));
  document.getElementById('page-'+name).classList.add('on');
  if(btn) btn.classList.add('on');
  if(name==='objectifs') renderObjectifs();
  if(name==='activites'&&allActivities.length) renderActivites(allActivities);
  if(name==='zones'&&allActivities.length) renderZones(allActivities);
  if(name==='profil') renderProfil(allActivities);
}

// ── INIT ──────────────────────────────────────────────────
async function init(){
  const params=new URLSearchParams(window.location.search);

  if(params.get('access_token')){
    const token=params.get('access_token'), athlete=params.get('athlete');
    if(token&&athlete){ localStorage.setItem('strava_token',token); localStorage.setItem('strava_athlete',decodeURIComponent(athlete)); history.replaceState({},'',window.location.pathname); }
  }
  if(params.get('code')){ const ok=await handleCallback(); if(!ok){ alert('Erreur de connexion Strava.'); return; } }
  if(params.get('error')){ history.replaceState({},'',window.location.pathname); }

  const token=getToken(), athlete=getAthlete();
  if(!token||!athlete){
    document.getElementById('login-screen').style.display='flex';
    document.getElementById('app').style.display='none';
    return;
  }

  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('athlete-name').textContent=athlete.firstname||'';
  if(athlete.profile_medium) document.getElementById('athlete-avatar').src=athlete.profile_medium;

  try{
    document.getElementById('home-content').innerHTML='<div class="loader"><div class="spinner"></div><p class="loader-text">Chargement de toutes tes activités...</p></div>';
    allActivities=await fetchAllActivities();
    renderHome(allActivities);
    renderObjectifs();
  }catch(e){
    document.getElementById('home-content').innerHTML='<div class="empty">Erreur de chargement.<br><span style="color:var(--accent);cursor:pointer;" onclick="location.reload()">Réessayer</span></div>';
  }
}

init();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Montagnette</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root {
  --bg:#0f0f17; --bg2:#181824; --bg3:#20202e; --bg4:#2c2c3e;
  --border:rgba(255,255,255,0.09); --border2:rgba(255,255,255,0.16);
  --t1:#f0eff8; --t2:#b8b8d0; --t3:#7878a0;
  --accent:#7c9eff; --green:#3dffa0; --amber:#ffc04d; --red:#ff7070; --purple:#d09aff;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--t1);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;padding-bottom:80px;}

/* LOGIN */
#login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:2rem;text-align:center;}
.logo-title{font-size:32px;font-weight:700;letter-spacing:3px;color:var(--t1);margin-bottom:4px;}
.logo-sub{font-size:12px;color:var(--accent);letter-spacing:5px;margin-bottom:3rem;}
.connect-btn{display:flex;align-items:center;gap:10px;background:#fc4c02;color:#fff;border:none;border-radius:10px;padding:14px 28px;font-size:14px;font-weight:600;cursor:pointer;letter-spacing:.5px;}
.connect-btn:hover{background:#e04400;}
.connect-btn svg{width:20px;height:20px;}
.login-note{font-size:11px;color:var(--t3);margin-top:1.5rem;max-width:260px;line-height:1.6;}

/* APP */
#app{display:none;}
.topbar{background:var(--bg2);border-bottom:0.5px solid var(--border2);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.app-name{font-size:16px;font-weight:700;letter-spacing:2px;color:var(--t1);}
.app-name span{color:var(--accent);}
.athlete-info{display:flex;align-items:center;gap:8px;}
.athlete-avatar{width:30px;height:30px;border-radius:50%;border:1.5px solid var(--accent);object-fit:cover;}
.athlete-name{font-size:11px;color:var(--t2);}
.disconnect{font-size:10px;color:var(--t3);cursor:pointer;text-decoration:underline;margin-left:8px;}

/* TABS NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:0.5px solid var(--border2);display:flex;z-index:100;}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 4px 8px;cursor:pointer;border:none;background:none;}
.nav-btn svg{width:18px;height:18px;stroke:var(--t3);}
.nav-btn span{font-size:9px;color:var(--t3);}
.nav-btn.on svg{stroke:var(--accent);}
.nav-btn.on span{color:var(--accent);}

/* PAGES */
.page{display:none;padding:16px;}
.page.on{display:block;}

/* CARDS */
.card{background:var(--bg2);border:0.5px solid var(--border2);border-radius:12px;padding:1rem 1.1rem;margin-bottom:12px;}
.card-title{font-size:13px;font-weight:500;color:var(--t1);margin-bottom:10px;}
.slbl{font-size:9px;color:var(--t2);font-weight:500;text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:6px;}

/* METRICS ROW */
.row3{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:12px;}
.mc{border-radius:8px;padding:9px 10px;border:0.5px solid var(--border);background:var(--bg3);}
.mc-v{font-size:18px;font-weight:500;color:var(--t1);line-height:1;}
.mc-l{font-size:8px;color:var(--t2);margin-top:3px;text-transform:uppercase;letter-spacing:.04em;}
.mc.g{background:rgba(61,255,160,0.09);border-color:rgba(61,255,160,0.22);}.mc.g .mc-v{color:var(--green);}
.mc.a{background:rgba(255,192,77,0.09);border-color:rgba(255,192,77,0.22);}.mc.a .mc-v{color:var(--amber);}
.mc.b{background:rgba(124,158,255,0.09);border-color:rgba(124,158,255,0.22);}.mc.b .mc-v{color:var(--accent);}
.mc.r{background:rgba(255,112,112,0.09);border-color:rgba(255,112,112,0.22);}.mc.r .mc-v{color:var(--red);}

/* OBJECTIVE CARD */
.obj-card{border-radius:10px;padding:10px 12px;margin-bottom:8px;background:var(--bg3);border:0.5px solid var(--border2);}
.obj-card.pri{border-left:2px solid var(--accent);border-radius:0 10px 10px 0;background:rgba(124,158,255,0.06);}
.obj-top{display:flex;justify-content:space-between;align-items:flex-start;gap:6px;}
.obj-name{font-size:12px;font-weight:500;color:var(--t1);}
.obj-date{font-size:9px;color:var(--t2);margin-top:2px;}
.bdg{font-size:9px;font-weight:500;padding:2px 8px;border-radius:4px;flex-shrink:0;}
.bt{background:rgba(61,255,160,0.1);color:var(--green);border:0.5px solid rgba(61,255,160,0.25);}
.br{background:rgba(124,158,255,0.1);color:var(--accent);border:0.5px solid rgba(124,158,255,0.25);}
.cdown{font-size:26px;font-weight:500;color:var(--accent);margin:5px 0 4px;letter-spacing:-.02em;}
.pb{height:4px;border-radius:2px;background:var(--bg4);overflow:hidden;margin-bottom:3px;}
.pf{height:100%;border-radius:2px;background:var(--accent);}
.plr{display:flex;justify-content:space-between;}
.pl{font-size:8px;color:var(--t2);}
.pl.hi{color:var(--accent);}

/* WEEK DOTS */
.wdots{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:6px;}
.wd{aspect-ratio:1;border-radius:4px;background:var(--bg3);}
.wd-r{background:var(--accent);opacity:.85;}
.wd-s{background:var(--green);opacity:.75;}
.wd-b{background:var(--amber);opacity:.75;}
.wd-y{background:var(--purple);opacity:.75;}
.wd-today{outline:1.5px solid var(--accent);}
.leg{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px;}
.li{display:flex;align-items:center;gap:4px;font-size:9px;color:var(--t2);}
.ld{width:7px;height:7px;border-radius:50%;}

/* ZONES */
.zrow{display:flex;align-items:center;gap:6px;margin-bottom:5px;}
.zl{font-size:9px;color:var(--t2);width:16px;}
.zbg{flex:1;height:5px;border-radius:3px;background:var(--bg3);overflow:hidden;}
.zf{height:100%;border-radius:3px;}
.zp{font-size:9px;color:var(--t2);width:26px;text-align:right;}

/* ACTIVITY LIST */
.act-item{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:0.5px solid var(--border);}
.act-item:last-child{border-bottom:none;}
.act-dot{width:7px;height:7px;border-radius:50%;margin-right:9px;flex-shrink:0;}
.act-name{font-size:11px;font-weight:500;color:var(--t1);}
.act-meta{font-size:9px;color:var(--t2);margin-top:1px;}
.act-badge{font-size:9px;font-weight:500;padding:2px 7px;border-radius:4px;}

/* COACH BOX */
.cbox{background:rgba(124,158,255,0.07);border:0.5px solid rgba(124,158,255,0.2);border-radius:8px;padding:9px 11px;margin-top:8px;}
.ct{font-size:10px;color:#aec4ff;line-height:1.55;}

/* FORM */
.form-group{margin-bottom:10px;}
.form-label{font-size:10px;color:var(--t2);text-transform:uppercase;letter-spacing:.04em;display:block;margin-bottom:4px;}
.form-input{width:100%;background:var(--bg3);border:0.5px solid var(--border2);border-radius:8px;padding:9px 11px;font-size:13px;color:var(--t1);outline:none;}
.form-input:focus{border-color:var(--accent);}
.form-row2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.form-select{width:100%;background:var(--bg3);border:0.5px solid var(--border2);border-radius:8px;padding:9px 11px;font-size:13px;color:var(--t1);outline:none;}
.add-btn{width:100%;height:40px;border-radius:10px;background:rgba(124,158,255,0.15);border:0.5px solid var(--accent);color:var(--accent);font-size:13px;font-weight:500;cursor:pointer;margin-top:4px;}
.add-btn:hover{background:rgba(124,158,255,0.25);}

/* STAT LINE */
.sline{display:flex;justify-content:space-between;padding:7px 0;border-bottom:0.5px solid var(--border);align-items:center;}
.sline:last-child{border-bottom:none;}
.sk{font-size:11px;color:var(--t2);}
.sv{font-size:11px;font-weight:500;color:var(--t1);}
.su{font-size:10px;color:var(--green);margin-left:4px;}
.sa{font-size:11px;font-weight:500;color:var(--accent);cursor:pointer;}

/* LOADER */
.loader{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:3rem;gap:12px;}
.spinner{width:32px;height:32px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loader-text{font-size:12px;color:var(--t2);}

/* EMPTY */
.empty{text-align:center;padding:2rem;color:var(--t3);font-size:12px;}

/* CHART */
.chart-wrap{position:relative;width:100%;height:160px;margin-bottom:4px;}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div style="margin-bottom:2rem;">
    <svg width="72" height="72" viewBox="0 0 512 512" style="border-radius:16px;">
      <rect width="512" height="512" fill="#0f0f17"/>
      <polygon points="100,350 200,145 300,350" fill="#141422" stroke="#4a6bff" stroke-width="2"/>
      <polygon points="180,350 300,95 420,350" fill="#181828" stroke="#7c9eff" stroke-width="2.5"/>
      <path d="M272,125 L300,95 L328,125 Q300,110 272,125Z" fill="#e8e8f0"/>
      <path d="M100,350 L155,268 L200,302 L255,215 L300,260 L355,228 L412,350" stroke="#3dffa0" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <circle cx="255" cy="215" r="8" fill="#3dffa0"/>
    </svg>
  </div>
  <p class="logo-title">MONTAGNETTE</p>
  <p class="logo-sub">TRAIL · PERFORMANCE</p>
  <button class="connect-btn" onclick="connectStrava()">
    <svg viewBox="0 0 24 24" fill="white"><path d="M15.387 17.944l-2.089-4.116h-3.065L15.387 24l5.15-10.172h-3.066m-7.008-5.599l2.836 5.598h4.172L10.463 0l-7 13.828h4.169"/></svg>
    Se connecter avec Strava
  </button>
  <p class="login-note">Lecture seule de tes activités. Aucune donnée stockée sur un serveur.</p>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <span class="app-name">MONT<span>AGNETTE</span></span>
    <div class="athlete-info">
      <img id="athlete-avatar" class="athlete-avatar" src="" alt="avatar" onerror="this.style.display='none'"/>
      <span id="athlete-name" class="athlete-name"></span>
      <span class="disconnect" onclick="disconnect()">Déco.</span>
    </div>
  </div>

  <!-- PAGES -->
  <div id="page-home" class="page on">
    <div id="home-content"><div class="loader"><div class="spinner"></div><p class="loader-text">Chargement...</p></div></div>
  </div>

  <div id="page-objectifs" class="page">
    <div id="obj-list"></div>
    <div class="card">
      <p class="card-title">Ajouter un objectif</p>
      <div class="form-group"><label class="form-label">Nom de la course</label><input class="form-input" id="obj-name" placeholder="Ex: Trail des Crêtes 2026"/></div>
      <div class="form-group"><label class="form-label">Date</label><input class="form-input" id="obj-date" type="date"/></div>
      <div class="form-row2">
        <div class="form-group"><label class="form-label">Distance (km)</label><input class="form-input" id="obj-dist" type="number" placeholder="33"/></div>
        <div class="form-group"><label class="form-label">Dénivelé (m D+)</label><input class="form-input" id="obj-deniv" type="number" placeholder="1800"/></div>
      </div>
      <div class="form-row2">
        <div class="form-group"><label class="form-label">Type</label>
          <select class="form-select" id="obj-type"><option value="trail">Trail</option><option value="route">Route</option><option value="velo">Vélo</option></select>
        </div>
        <div class="form-group"><label class="form-label">Priorité</label>
          <select class="form-select" id="obj-prio"><option value="A">A — Principal</option><option value="B">B — Secondaire</option><option value="C">C — Découverte</option></select>
        </div>
      </div>
      <button class="add-btn" onclick="addObjectif()">+ Enregistrer l'objectif</button>
    </div>
  </div>

  <div id="page-activites" class="page">
    <div id="act-content"><div class="loader"><div class="spinner"></div><p class="loader-text">Chargement...</p></div></div>
  </div>

  <div id="page-zones" class="page">
    <div id="zones-content"><div class="loader"><div class="spinner"></div><p class="loader-text">Chargement...</p></div></div>
  </div>

  <div id="page-profil" class="page">
    <div id="profil-content"><div class="loader"><div class="spinner"></div><p class="loader-text">Chargement...</p></div></div>
  </div>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <button class="nav-btn on" onclick="showPage('home',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>
      <span>Home</span>
    </button>
    <button class="nav-btn" onclick="showPage('objectifs',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 17l3-5 3 4 3-7 3 4 3-3"/></svg>
      <span>Objectifs</span>
    </button>
    <button class="nav-btn" onclick="showPage('activites',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M7 4V2m10 2V2M3 9h18"/></svg>
      <span>Activités</span>
    </button>
    <button class="nav-btn" onclick="showPage('zones',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 14l4-5 4 6 4-10 4 6 3-3"/></svg>
      <span>Zones</span>
    </button>
    <button class="nav-btn" onclick="showPage('profil',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
      <span>Profil</span>
    </button>
  </nav>
</div>

<script>
// ─── CONFIG ───────────────────────────────────────────────
const CLIENT_ID     = '225769';
const WORKER_URL    = 'https://dashboard-oauth.biancone-theo.workers.dev';
const REDIRECT_URI  = WORKER_URL + '/callback';
const FC_MAX        = parseInt(localStorage.getItem('fc_max') || '190');

// ─── AUTH ─────────────────────────────────────────────────
function connectStrava() {
  const scope = 'read,activity:read';
  const url = `https://www.strava.com/oauth/authorize?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&response_type=code&scope=${scope}`;
  window.location.href = url;
}

function disconnect() {
  localStorage.removeItem('strava_token');
  localStorage.removeItem('strava_athlete');
  location.reload();
}

// Handle OAuth callback (code in URL params)
async function handleCallback() {
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  if (!code) return false;
  history.replaceState({}, '', window.location.pathname);
  try {
    const res = await fetch(`${WORKER_URL}/token?code=${code}`);
    const data = await res.json();
    if (data.access_token) {
      localStorage.setItem('strava_token', data.access_token);
      localStorage.setItem('strava_athlete', JSON.stringify(data.athlete));
      return true;
    }
  } catch(e) { console.error(e); }
  return false;
}

function getToken() { return localStorage.getItem('strava_token'); }
function getAthlete() {
  try { return JSON.parse(localStorage.getItem('strava_athlete') || 'null'); } catch(e) { return null; }
}

// ─── API ──────────────────────────────────────────────────
async function fetchActivities(perPage=60, page=1) {
  const res = await fetch(`https://www.strava.com/api/v3/athlete/activities?per_page=${perPage}&page=${page}`, {
    headers: { Authorization: 'Bearer ' + getToken() }
  });
  if (!res.ok) throw new Error('API error');
  return res.json();
}

async function fetchAthleteStats() {
  const athlete = getAthlete();
  if (!athlete) return null;
  const res = await fetch(`https://www.strava.com/api/v3/athletes/${athlete.id}/stats`, {
    headers: { Authorization: 'Bearer ' + getToken() }
  });
  if (!res.ok) return null;
  return res.json();
}

// ─── OBJECTIVES ───────────────────────────────────────────
function getObjectifs() {
  try { return JSON.parse(localStorage.getItem('objectifs') || '[]'); } catch(e) { return []; }
}
function saveObjectifs(list) { localStorage.setItem('objectifs', JSON.stringify(list)); }

function addObjectif() {
  const name  = document.getElementById('obj-name').value.trim();
  const date  = document.getElementById('obj-date').value;
  const dist  = parseFloat(document.getElementById('obj-dist').value) || 0;
  const deniv = parseFloat(document.getElementById('obj-deniv').value) || 0;
  const type  = document.getElementById('obj-type').value;
  const prio  = document.getElementById('obj-prio').value;
  if (!name || !date) { alert('Nom et date requis.'); return; }
  const list = getObjectifs();
  list.push({ id: Date.now(), name, date, dist, deniv, type, prio });
  list.sort((a,b) => new Date(a.date) - new Date(b.date));
  saveObjectifs(list);
  document.getElementById('obj-name').value = '';
  document.getElementById('obj-date').value = '';
  document.getElementById('obj-dist').value = '';
  document.getElementById('obj-deniv').value = '';
  renderObjectifs();
}

function deleteObjectif(id) {
  saveObjectifs(getObjectifs().filter(o => o.id !== id));
  renderObjectifs();
}

function daysUntil(dateStr) {
  const diff = new Date(dateStr) - new Date();
  return Math.ceil(diff / 86400000);
}

// ─── HELPERS ──────────────────────────────────────────────
function actType(a) {
  const t = (a.sport_type || a.type || '').toLowerCase();
  if (t.includes('run') || t.includes('trail') || t.includes('course')) return 'run';
  if (t.includes('ride') || t.includes('velo') || t.includes('cycl') || t.includes('bike')) return 'bike';
  if (t.includes('weight') || t.includes('muscul') || t.includes('strength')) return 'strength';
  if (t.includes('yoga') || t.includes('stretch')) return 'yoga';
  if (t.includes('walk') || t.includes('march') || t.includes('hike')) return 'walk';
  return 'other';
}

function typeColor(type) {
  return {run:'#7c9eff', bike:'#ffc04d', strength:'#3dffa0', yoga:'#d09aff', walk:'#aec4ff', other:'#7878a0'}[type] || '#7878a0';
}

function typeName(type) {
  return {run:'Course', bike:'Vélo', strength:'Musculation', yoga:'Yoga', walk:'Marche', other:'Entraînement'}[type] || 'Autre';
}

function fcZone(fcMoy, fcMax) {
  const pct = fcMoy / fcMax;
  if (pct < 0.6)  return {z:'Z1', color:'#4a6bff', bg:'rgba(74,107,255,0.12)'};
  if (pct < 0.7)  return {z:'Z2', color:'#7c9eff', bg:'rgba(124,158,255,0.12)'};
  if (pct < 0.8)  return {z:'Z3', color:'#3dffa0', bg:'rgba(61,255,160,0.12)'};
  if (pct < 0.9)  return {z:'Z4', color:'#ffc04d', bg:'rgba(255,192,77,0.12)'};
  return {z:'Z5', color:'#ff7070', bg:'rgba(255,112,112,0.12)'};
}

function fmtDist(m) { return (m/1000).toFixed(1) + ' km'; }
function fmtTime(s) { const h=Math.floor(s/3600),m=Math.floor((s%3600)/60); return h>0?`${h}h${String(m).padStart(2,'0')}`:`${m} min`; }
function fmtDeniv(m) { return Math.round(m) + ' m D+'; }

function getWeekActivities(activities) {
  const now = new Date();
  const mon = new Date(now); mon.setDate(now.getDate() - ((now.getDay()+6)%7)); mon.setHours(0,0,0,0);
  return activities.filter(a => new Date(a.start_date) >= mon);
}

function getWeeklyVolumes(activities, n=8) {
  const weeks = [];
  const now = new Date();
  for (let i=n-1; i>=0; i--) {
    const start = new Date(now); start.setDate(now.getDate() - ((now.getDay()+6)%7) - i*7); start.setHours(0,0,0,0);
    const end   = new Date(start); end.setDate(start.getDate()+7);
    const acts  = activities.filter(a => { const d=new Date(a.start_date); return d>=start && d<end; });
    const km    = acts.reduce((s,a)=>s+(a.distance||0)/1000,0);
    weeks.push({ label: `S${n-i}`, km: Math.round(km*10)/10 });
  }
  return weeks;
}

function calcZoneDistrib(activities) {
  const fcm = parseInt(localStorage.getItem('fc_max')||'190');
  const runs = activities.filter(a=>actType(a)==='run' && a.average_heartrate);
  const zones = {Z1:0,Z2:0,Z3:0,Z4:0,Z5:0};
  runs.forEach(a=>{
    const z = fcZone(a.average_heartrate, fcm);
    zones[z.z]++;
  });
  const total = Object.values(zones).reduce((s,v)=>s+v,0)||1;
  return Object.fromEntries(Object.entries(zones).map(([k,v])=>[k,Math.round(v/total*100)]));
}

// ─── RENDER HOME ──────────────────────────────────────────
function renderHome(activities) {
  const fcMax = parseInt(localStorage.getItem('fc_max')||'190');
  const athlete = getAthlete();
  const runs  = activities.filter(a=>actType(a)==='run');
  const weeks = getWeekActivities(activities);
  const zDist = calcZoneDistrib(activities);
  const objs  = getObjectifs().filter(o=>daysUntil(o.date)>0).sort((a,b)=>new Date(a.date)-new Date(b.date));
  const priObj = objs[0] || null;

  // FC moy course
  const fcRuns = runs.filter(a=>a.average_heartrate);
  const fcMoy  = fcRuns.length ? Math.round(fcRuns.reduce((s,a)=>s+a.average_heartrate,0)/fcRuns.length) : '—';

  // Forme signal (simple heuristic: activités 7 derniers jours)
  const forme = weeks.length >= 3 ? 'Bon' : weeks.length >= 1 ? 'Moyen' : 'Faible';
  const formeClass = forme==='Bon'?'g':forme==='Moyen'?'a':'r';

  // Week dots
  const now = new Date();
  const todayDow = (now.getDay()+6)%7;
  const weekDotColors = Array(7).fill('').map((_,i)=>{
    const d = new Date(now); d.setDate(now.getDate()-todayDow+i); d.setHours(0,0,0,0);
    const de = new Date(d); de.setDate(d.getDate()+1);
    const act = activities.find(a=>{ const ad=new Date(a.start_date); return ad>=d && ad<de; });
    const cls = i===todayDow?'wd wd-today':'wd';
    if (!act) return `<div class="${cls}"></div>`;
    const t = actType(act);
    const tc = {run:'wd-r',bike:'wd-b',strength:'wd-s',yoga:'wd-y'}[t]||'';
    return `<div class="${cls} ${tc}"></div>`;
  });

  // Z4 dominant warning
  const z4pct = zDist.Z4 || 0;
  const coachMsg = z4pct > 40
    ? `Z4 domine à ${z4pct}%. Ajoute une sortie Z2 de 50 min cette semaine pour construire ta base aérobie.`
    : z4pct > 25
    ? `Bonne répartition. Continue à maintenir un bon volume en Z2–Z3.`
    : `Excellente base aérobie. Tu es bien positionné pour progresser sur longue distance.`;

  let objHTML = '';
  if (priObj) {
    const jours = daysUntil(priObj.date);
    const prepaDays = 70;
    const pct = Math.max(0, Math.min(100, Math.round((1 - jours/prepaDays)*100)));
    objHTML = `
    <span class="slbl">Prochain objectif</span>
    <div class="obj-card pri">
      <div class="obj-top">
        <div><p class="obj-name">${priObj.name}</p><p class="obj-date">${new Date(priObj.date).toLocaleDateString('fr-FR',{day:'numeric',month:'long',year:'numeric'})} · Priorité ${priObj.prio}</p></div>
        <span class="bdg ${priObj.type==='trail'?'bt':'br'}">${priObj.type.charAt(0).toUpperCase()+priObj.type.slice(1)}</span>
      </div>
      <p class="cdown">J–${jours}</p>
      <div class="pb"><div class="pf" style="width:${pct}%;"></div></div>
      <div class="plr"><span class="pl">Début prépa</span><span class="pl hi">${pct}%</span><span class="pl">Course</span></div>
    </div>`;
  } else {
    objHTML = `<div class="empty" style="margin-bottom:10px;">Aucun objectif défini — va dans l'onglet Objectifs pour en ajouter un.</div>`;
  }

  document.getElementById('home-content').innerHTML = `
    <div class="row3">
      <div class="mc ${formeClass}"><p class="mc-v">${forme}</p><p class="mc-l">Forme</p></div>
      <div class="mc b"><p class="mc-v">${fcMoy}</p><p class="mc-l">FC moy</p></div>
      <div class="mc g"><p class="mc-v">${runs.length}</p><p class="mc-l">Sorties</p></div>
    </div>
    ${objHTML}
    <div class="card">
      <span class="slbl">Cette semaine</span>
      <div class="wdots">${weekDotColors.join('')}</div>
      <div class="leg">
        <div class="li"><div class="ld" style="background:#7c9eff;"></div>Course</div>
        <div class="li"><div class="ld" style="background:#3dffa0;"></div>Muscul.</div>
        <div class="li"><div class="ld" style="background:#ffc04d;"></div>Vélo</div>
        <div class="li"><div class="ld" style="background:#d09aff;"></div>Yoga</div>
      </div>
      <span class="slbl">Zones cette semaine</span>
      <div class="zrow"><span class="zl">Z2</span><div class="zbg"><div class="zf" style="width:${zDist.Z2||0}%;background:#7c9eff;opacity:.7;"></div></div><span class="zp">${zDist.Z2||0}%</span></div>
      <div class="zrow"><span class="zl">Z3</span><div class="zbg"><div class="zf" style="width:${zDist.Z3||0}%;background:#7c9eff;"></div></div><span class="zp">${zDist.Z3||0}%</span></div>
      <div class="zrow"><span class="zl">Z4</span><div class="zbg"><div class="zf" style="width:${zDist.Z4||0}%;background:#ff7070;"></div></div><span class="zp">${zDist.Z4||0}%</span></div>
      <div class="zrow"><span class="zl">Z5</span><div class="zbg"><div class="zf" style="width:${zDist.Z5||0}%;background:#ff4040;"></div></div><span class="zp">${zDist.Z5||0}%</span></div>
      <div class="cbox"><p class="ct">${coachMsg}</p></div>
    </div>`;
}

// ─── RENDER OBJECTIFS ─────────────────────────────────────
function renderObjectifs() {
  const objs = getObjectifs();
  let html = '';
  if (objs.length === 0) {
    html = '<div class="empty">Aucun objectif enregistré.<br>Ajoute ta première course ci-dessous.</div>';
  } else {
    objs.forEach(o => {
      const j = daysUntil(o.date);
      const pct = Math.max(0,Math.min(100,Math.round((1-j/70)*100)));
      const past = j < 0;
      html += `<div class="obj-card ${o.prio==='A'?'pri':''}">
        <div class="obj-top">
          <div><p class="obj-name">${o.name}</p><p class="obj-date">${new Date(o.date).toLocaleDateString('fr-FR',{day:'numeric',month:'long',year:'numeric'})}${o.dist?` · ${o.dist} km`:''}${o.deniv?` / ${o.deniv} m D+`:''}</p></div>
          <div style="display:flex;gap:6px;align-items:center;">
            <span class="bdg ${o.type==='trail'?'bt':'br'}">${o.type.charAt(0).toUpperCase()+o.type.slice(1)}</span>
            <span style="font-size:9px;font-weight:500;padding:2px 7px;border-radius:4px;background:rgba(255,255,255,0.06);color:#b8b8d0;">P.${o.prio}</span>
          </div>
        </div>
        ${past ? `<p style="font-size:11px;color:var(--green);margin-top:5px;">Terminée</p>` : `
        <p class="cdown">J–${j}</p>
        <div class="pb"><div class="pf" style="width:${pct}%;"></div></div>
        <div class="plr"><span class="pl">Début prépa</span><span class="pl hi">${pct}%</span><span class="pl">Course</span></div>`}
        <button onclick="deleteObjectif(${o.id})" style="margin-top:8px;background:none;border:0.5px solid rgba(255,112,112,0.3);border-radius:6px;color:#ff7070;font-size:10px;padding:4px 10px;cursor:pointer;">Supprimer</button>
      </div>`;
    });
  }
  document.getElementById('obj-list').innerHTML = html;
}

// ─── RENDER ACTIVITES ─────────────────────────────────────
function renderActivites(activities) {
  const weeks = getWeeklyVolumes(activities, 8);
  const recent = activities.slice(0,20);

  const barColors = weeks.map((_,i)=>{
    if(i<2) return 'rgba(74,107,255,0.6)';
    if(i<5) return '#7c9eff';
    if(i<7) return '#3dffa0';
    return '#ffc04d';
  });
  const maxKm = Math.max(...weeks.map(w=>w.km), 1);

  let actRows = '';
  recent.forEach(a => {
    const t = actType(a);
    const col = typeColor(t);
    const nm = typeName(t);
    let meta = '';
    if (a.distance) meta += fmtDist(a.distance);
    if (a.total_elevation_gain > 10) meta += ` · ${fmtDeniv(a.total_elevation_gain)}`;
    if (a.moving_time) meta += ` · ${fmtTime(a.moving_time)}`;
    if (a.average_heartrate) meta += ` · ${Math.round(a.average_heartrate)} bpm`;
    let badge = '';
    if (a.average_heartrate) {
      const z = fcZone(a.average_heartrate, parseInt(localStorage.getItem('fc_max')||'190'));
      badge = `<span class="act-badge" style="background:${z.bg};color:${z.color};">${z.z}</span>`;
    } else if (t === 'strength') {
      badge = `<span class="act-badge" style="background:rgba(61,255,160,0.1);color:#3dffa0;">Force</span>`;
    } else if (t === 'yoga') {
      badge = `<span class="act-badge" style="background:rgba(208,154,255,0.1);color:#d09aff;">Récup</span>`;
    }
    const dateStr = new Date(a.start_date).toLocaleDateString('fr-FR',{weekday:'short',day:'numeric',month:'short'});
    actRows += `<div class="act-item">
      <div style="display:flex;align-items:center;flex:1;min-width:0;">
        <div class="act-dot" style="background:${col};"></div>
        <div style="min-width:0;">
          <p class="act-name">${a.name || nm}</p>
          <p class="act-meta">${dateStr} · ${meta}</p>
        </div>
      </div>
      ${badge}
    </div>`;
  });

  document.getElementById('act-content').innerHTML = `
    <div class="card">
      <span class="slbl">Volume 8 semaines (km)</span>
      <div class="chart-wrap"><canvas id="vol-chart" role="img" aria-label="Volume hebdomadaire sur 8 semaines">Volume en km par semaine.</canvas></div>
      <div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:4px;font-size:9px;color:var(--t2);">
        <span style="display:flex;align-items:center;gap:3px;"><span style="width:9px;height:9px;border-radius:2px;background:#7c9eff;display:inline-block;"></span>Course</span>
        <span style="display:flex;align-items:center;gap:3px;"><span style="width:9px;height:9px;border-radius:2px;background:#ffc04d;display:inline-block;"></span>Vélo</span>
        <span style="display:flex;align-items:center;gap:3px;"><span style="width:9px;height:9px;border-radius:2px;background:#3dffa0;display:inline-block;"></span>Muscul.</span>
      </div>
    </div>
    <div class="card">
      <span class="slbl">Dernières activités</span>
      ${actRows || '<p class="empty">Aucune activité trouvée.</p>'}
    </div>`;

  setTimeout(() => {
    const ctx = document.getElementById('vol-chart');
    if (ctx) {
      new Chart(ctx, {
        type: 'bar',
        data: {
          labels: weeks.map(w=>w.label),
          datasets: [{ data: weeks.map(w=>w.km), backgroundColor: barColors, borderRadius: 3, borderSkipped: false }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { display: false }, tooltip: { callbacks: { label: c => c.parsed.y + ' km' } } },
          scales: {
            x: { grid: { display: false }, ticks: { color: '#7878a0', font: { size: 10 } } },
            y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#7878a0', font: { size: 10 } } }
          }
        }
      });
    }
  }, 100);
}

// ─── RENDER ZONES ─────────────────────────────────────────
function renderZones(activities) {
  const fcMax = parseInt(localStorage.getItem('fc_max')||'190');
  const runs  = activities.filter(a=>actType(a)==='run' && a.average_heartrate);
  const zDist = calcZoneDistrib(activities);
  const fcMoy = runs.length ? Math.round(runs.reduce((s,a)=>s+a.average_heartrate,0)/runs.length) : 0;

  const zColors = {Z1:'#4a6bff',Z2:'#7c9eff',Z3:'#3dffa0',Z4:'#ffc04d',Z5:'#ff7070'};
  let zRows = '';
  ['Z1','Z2','Z3','Z4','Z5'].forEach(z=>{
    const pct = zDist[z]||0;
    zRows += `<div class="zrow">
      <span class="zl">${z}</span>
      <div class="zbg"><div class="zf" style="width:${pct}%;background:${zColors[z]};"></div></div>
      <span class="zp">${pct}%</span>
    </div>`;
  });

  const z2z3 = (zDist.Z1||0)+(zDist.Z2||0)+(zDist.Z3||0);
  const coachZone = z2z3 < 50
    ? `Tu passes ${100-z2z3}% du temps en Z4–Z5. Pour le trail, cible 70–80% en Z1–Z3.`
    : `Bonne base aérobie à ${z2z3}% en Z1–Z3. Continue sur cette lancée.`;

  document.getElementById('zones-content').innerHTML = `
    <div class="row3">
      <div class="mc b"><p class="mc-v">${fcMoy||'—'}</p><p class="mc-l">FC moy course</p></div>
      <div class="mc g"><p class="mc-v">${fcMax}</p><p class="mc-l">FC max</p></div>
      <div class="mc ${(zDist.Z4||0)>40?'r':'a'}"><p class="mc-v">${Object.entries(zDist).sort((a,b)=>b[1]-a[1])[0]?.[0]||'—'}</p><p class="mc-l">Zone dom.</p></div>
    </div>
    <div class="card">
      <span class="slbl">Répartition cumulée</span>
      ${zRows}
      <div class="cbox"><p class="ct">${coachZone}</p></div>
    </div>
    <div class="card">
      <span class="slbl">Progression Z2 — 8 semaines</span>
      <div class="chart-wrap" style="height:130px;"><canvas id="z2-chart" role="img" aria-label="Évolution Z2 sur 8 semaines">Évolution de la zone 2.</canvas></div>
    </div>
    <div class="card">
      <span class="slbl">FC max personnalisée</span>
      <div style="display:flex;gap:8px;align-items:center;">
        <input id="fc-max-input" class="form-input" type="number" value="${fcMax}" style="flex:1;"/>
        <button class="add-btn" style="width:auto;padding:0 16px;" onclick="saveFcMax()">Enregistrer</button>
      </div>
    </div>`;

  // Z2 trend chart
  const getWeekZ2 = (n) => {
    const now = new Date();
    const labels = [], vals = [];
    for (let i=n-1;i>=0;i--) {
      const start = new Date(now); start.setDate(now.getDate()-((now.getDay()+6)%7)-i*7); start.setHours(0,0,0,0);
      const end   = new Date(start); end.setDate(start.getDate()+7);
      const wRuns = runs.filter(a=>{ const d=new Date(a.start_date); return d>=start&&d<end; });
      const z2n   = wRuns.filter(a=>{ const p=a.average_heartrate/fcMax; return p>=0.6&&p<0.7; }).length;
      const tot   = wRuns.length||1;
      labels.push(`S${n-i}`); vals.push(Math.round(z2n/tot*100));
    }
    return {labels,vals};
  };
  const {labels,vals} = getWeekZ2(8);
  setTimeout(()=>{
    const ctx2 = document.getElementById('z2-chart');
    if(ctx2) new Chart(ctx2,{
      type:'line',
      data:{ labels, datasets:[{ data:vals, borderColor:'#3dffa0', backgroundColor:'rgba(61,255,160,0.08)', tension:.4, pointRadius:3, pointBackgroundColor:'#3dffa0', fill:true }] },
      options:{ responsive:true, maintainAspectRatio:false, plugins:{ legend:{display:false}, tooltip:{callbacks:{label:c=>c.parsed.y+'%'}} }, scales:{ x:{grid:{display:false},ticks:{color:'#7878a0',font:{size:10}}}, y:{grid:{color:'rgba(255,255,255,0.05)'},ticks:{color:'#7878a0',font:{size:10}},min:0,max:100} } }
    });
  },100);
}

function saveFcMax() {
  const v = parseInt(document.getElementById('fc-max-input').value);
  if (v > 100 && v < 230) { localStorage.setItem('fc_max', v); alert('FC max enregistrée : ' + v + ' bpm'); }
}

// ─── RENDER PROFIL ────────────────────────────────────────
async function renderProfil(activities) {
  const athlete = getAthlete();
  const runs   = activities.filter(a=>actType(a)==='run');
  const bikes  = activities.filter(a=>actType(a)==='bike');
  const totalKm   = Math.round(runs.reduce((s,a)=>s+(a.distance||0)/1000,0));
  const totalDeniv= Math.round(runs.reduce((s,a)=>s+(a.total_elevation_gain||0),0));
  const fcMax  = parseInt(localStorage.getItem('fc_max')||'190');

  let statsHTML = '';
  try {
    const stats = await fetchAthleteStats();
    if (stats) {
      const allRun = stats.all_run_totals;
      statsHTML = `
        <div class="sline"><span class="sk">Total km course (Strava)</span><span class="sv">${Math.round((allRun.distance||0)/1000).toLocaleString('fr-FR')} km</span></div>
        <div class="sline"><span class="sk">Total activités</span><span class="sv">${activities.length}</span></div>`;
    }
  } catch(e){}

  document.getElementById('profil-content').innerHTML = `
    <div class="card" style="display:flex;align-items:center;gap:12px;margin-bottom:12px;">
      <img src="${athlete?.profile_medium||''}" style="width:48px;height:48px;border-radius:50%;border:1.5px solid var(--accent);" onerror="this.style.display='none'"/>
      <div>
        <p style="font-size:14px;font-weight:500;color:var(--t1);">${athlete?.firstname||''} ${athlete?.lastname||''}</p>
        <p style="font-size:10px;color:var(--t2);margin-top:2px;">Strava Premium · ${athlete?.city||''}${athlete?.country?' · '+athlete.country:''}</p>
      </div>
    </div>
    <div class="card">
      <span class="slbl">Statistiques globales</span>
      <div class="sline"><span class="sk">Km course (chargés)</span><span class="sv">${totalKm.toLocaleString('fr-FR')} km</span></div>
      <div class="sline"><span class="sk">D+ course total</span><span class="sv">${totalDeniv.toLocaleString('fr-FR')} m</span></div>
      ${statsHTML}
      <div class="sline"><span class="sk">Activités vélo</span><span class="sv">${bikes.length}</span></div>
    </div>
    <div class="card">
      <span class="slbl">Paramètres</span>
      <div class="sline"><span class="sk">FC max</span><span class="sa" onclick="showPage('zones',document.querySelectorAll('.nav-btn')[3])">${fcMax} bpm · modifier</span></div>
      <div class="sline"><span class="sk">Méthode zones</span><span class="sv">% FC max</span></div>
      <div class="sline"><span class="sk">Connexion Strava</span><span class="sv" style="color:var(--green);">Actif</span></div>
      <div class="sline"><span class="sk">Données chargées</span><span class="sv">${activities.length} activités</span></div>
    </div>
    <div class="card">
      <button onclick="disconnect()" style="width:100%;height:36px;border-radius:8px;background:rgba(255,112,112,0.08);border:0.5px solid rgba(255,112,112,0.3);color:#ff7070;font-size:12px;cursor:pointer;">Se déconnecter de Strava</button>
    </div>`;
}

// ─── NAVIGATION ───────────────────────────────────────────
let allActivities = [];

function showPage(name, btn) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('on'));
  document.getElementById('page-'+name).classList.add('on');
  if (btn) btn.classList.add('on');

  if (name === 'objectifs') renderObjectifs();
  if (name === 'activites' && allActivities.length) renderActivites(allActivities);
  if (name === 'zones'     && allActivities.length) renderZones(allActivities);
  if (name === 'profil'    && allActivities.length) renderProfil(allActivities);
}

// ─── INIT ─────────────────────────────────────────────────
async function init() {
  const params = new URLSearchParams(window.location.search);

  // Cas 1 : le Worker a redirigé avec access_token directement dans l'URL
  if (params.get('access_token')) {
    const token   = params.get('access_token');
    const athlete = params.get('athlete');
    if (token && athlete) {
      localStorage.setItem('strava_token', token);
      localStorage.setItem('strava_athlete', decodeURIComponent(athlete));
      history.replaceState({}, '', window.location.pathname);
    }
  }

  // Cas 2 : code OAuth classique → échange via /token
  if (params.get('code')) {
    const ok = await handleCallback();
    if (!ok) { alert('Erreur de connexion Strava. Réessaie.'); return; }
  }

  // Cas 3 : erreur remontée par le Worker
  if (params.get('error')) {
    console.warn('OAuth error:', params.get('error'));
    history.replaceState({}, '', window.location.pathname);
  }

  const token = getToken();
  const athlete = getAthlete();

  if (!token || !athlete) {
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
    return;
  }

  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';

  // Set athlete info in topbar
  document.getElementById('athlete-name').textContent = athlete.firstname || '';
  if (athlete.profile_medium) document.getElementById('athlete-avatar').src = athlete.profile_medium;

  // Load activities
  try {
    const [page1, page2] = await Promise.all([fetchActivities(60,1), fetchActivities(60,2)]);
    allActivities = [...page1, ...page2];
    renderHome(allActivities);
    renderObjectifs();
  } catch(e) {
    document.getElementById('home-content').innerHTML = '<div class="empty">Erreur de chargement. Vérifie ta connexion et réessaie.</div>';
    console.error(e);
  }
}

init();
</script>
